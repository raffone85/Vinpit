<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0b0d12">
  <title>Match Analyzer – Single View (Stable)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <style>
    /* Stili di base (uguali all'originale) */
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0b0d12;--s1:#141720;--s2:#1a1e2a;--s3:#252a38;
      --brd:#2d3345;--brd2:#3a4055;
      --t1:#e8ecf4;--t2:#a0a8be;--t3:#6b7490;
      --grn:#4ade80;--grn2:#22c55e;--grn-bg:rgba(74,222,128,.1);
      --amb:#fbbf24;--amb-bg:rgba(251,191,36,.1);
      --red:#f87171;--red-bg:rgba(248,113,113,.08);
      --blu:#60a5fa;--blu-bg:rgba(96,165,250,.1);
      --cyn:#22d3ee;--cyn-bg:rgba(34,211,238,.08);
      --mag:#c084fc;--mag-bg:rgba(192,132,252,.08);
      --org:#fb923c;--org-bg:rgba(251,146,60,.08);
      --M:'IBM Plex Mono',monospace;--S:'DM Sans',sans-serif;
    }
    html{font-size:15px;background:var(--bg)}
    body{
      background:var(--bg);color:var(--t1);font-family:var(--S);
      min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;
      padding:16px 14px 30px;
    }
    button,input,select{font:inherit}
    button{border:none;background:none;cursor:pointer}
    .app{max-width:1400px;margin:0 auto;}
    .hdr{padding:18px 0 10px;margin-bottom:8px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .hdr h1{font-size:1.5rem;font-weight:700;color:#fff;letter-spacing:-.4px}
    .hdr h1 span{color:var(--grn)}
    .hdr-info{font:500 .8rem var(--S);color:var(--t3)}
    .panel{background:var(--s1);border:1px solid var(--brd);border-radius:14px;padding:12px;margin-bottom:16px}
    .dataset-toggle{display:flex;align-items:center;justify-content:space-between;padding:8px 0;cursor:pointer;user-select:none}
    .dataset-toggle h3{font-size:1rem;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:6px}
    .dataset-toggle .arrow{font-size:1.2rem;color:var(--t3);transition:transform .2s}
    .dataset-panel{overflow:hidden;transition:max-height .3s ease;max-height:0}
    .dataset-panel.open{max-height:800px}
    .upload-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-top:12px}
    .upload-card{position:relative;padding:14px;border:1.5px dashed var(--brd2);border-radius:12px;background:rgba(255,255,255,.01);min-height:92px;display:flex;flex-direction:column;justify-content:center;gap:6px}
    .upload-card:hover{border-color:var(--grn2);background:rgba(74,222,128,.03)}
    .upload-lbl{font:700 .8rem var(--M);color:#fff}
    .upload-meta{font:500 .82rem var(--S);color:var(--t2);line-height:1.45}
    .loaded{color:var(--grn);font-weight:700}
    .clear-btn,.pick-btn{align-self:flex-start;padding:6px 10px;border-radius:8px;background:var(--red-bg);border:1px solid rgba(248,113,113,.25);color:var(--red);font:700 .75rem var(--M);margin-top:4px}
    .pick-btn{background:var(--blu-bg);color:var(--blu);border-color:rgba(96,165,250,.2);margin-right:6px}

    /* Toolbar */
    .toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin-bottom:16px;background:var(--s1);padding:12px 16px;border-radius:14px;border:1px solid var(--brd);}
    .market-select{min-width:180px;}
    .search-box{flex:1;min-width:200px;}
    .filter-group{display:flex;gap:16px;margin-left:8px;}
    .filter-group label{display:flex;align-items:center;gap:6px;font-size:0.85rem;color:var(--t2);cursor:pointer;}
    .btn{padding:8px 14px;border-radius:8px;font-weight:600;font-size:0.85rem;border:1px solid var(--brd);background:var(--s2);color:var(--t1);}
    .btn-primary{background:var(--grn);color:var(--bg);border-color:var(--grn);}

    /* Layout principale */
    .main-layout{display:flex;gap:20px;margin-top:10px;}
    .table-wrapper{flex:2.5;min-width:0;background:var(--s1);border-radius:16px;padding:16px;border:1px solid var(--brd);}
    .detail-panel{flex:1.2;background:var(--s1);border-radius:16px;padding:18px;border:1px solid var(--brd);max-height:80vh;overflow-y:auto;position:sticky;top:16px;}
    @media (max-width:900px){ .main-layout{flex-direction:column;} .detail-panel{max-height:none;position:static;} }

    /* Tabella */
    .match-table{width:100%;border-collapse:collapse;font-size:0.9rem;}
    .match-table th{text-align:left;padding:12px 8px;color:var(--t3);font-weight:600;border-bottom:1px solid var(--brd);}
    .match-table td{padding:12px 8px;border-bottom:1px solid var(--brd);}
    .match-table tbody tr{cursor:pointer;transition:background 0.1s;}
    .match-table tbody tr:hover{background:var(--s2);}
    .match-table tbody tr.selected{background:var(--s3);border-left:3px solid var(--grn);}
    .score-bar{width:80px;height:6px;background:var(--s3);border-radius:4px;overflow:hidden;display:inline-block;margin-right:6px;}
    .score-fill{height:100%;background:var(--grn);border-radius:4px;}
    .aff-dots{display:flex;gap:3px;}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--s3);}
    .dot.filled{background:var(--grn);}
    .badge{padding:3px 8px;border-radius:5px;font:700 .7rem var(--M);background:var(--blu-bg);color:var(--blu);margin-right:4px;white-space:nowrap;}

    /* Dettaglio */
    .detail-title{font-size:1.3rem;font-weight:700;margin-bottom:16px;}
    .detail-section{margin-bottom:20px;}
    .detail-label{font-size:0.75rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--t3);margin-bottom:6px;}
    .detail-value{font-size:1.1rem;font-weight:500;}
    .breakdown-item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--brd);}
    .bk{margin-top:14px;padding-top:14px;border-top:1px solid var(--brd);}
  </style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div>
      <h1>Match <span>Analyzer</span> · Single View</h1>
      <div class="hdr-info" id="hdrInfo">Carica i CSV e seleziona un mercato</div>
      <div id="backtestInfo" style="font-size:0.75rem; color:var(--t3); margin-top:4px;"></div>
    </div>
  </div>

  <!-- Pannello Dataset -->
  <div class="panel">
    <div class="dataset-toggle" id="datasetToggle">
      <h3><span>📂</span> Gestione Dataset</h3>
      <span class="arrow" id="toggleArrow">▼</span>
    </div>
    <div class="dataset-panel" id="datasetPanel">
      <div class="upload-grid" id="uploadGrid"></div>
      <div class="footer-note" style="margin-top:12px; color:var(--t3);">File CSV supportati (separatore ; o ,)</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <select id="marketSelect" class="market-select" style="background:var(--s2); border:1px solid var(--brd); color:var(--t1); padding:8px 12px; border-radius:8px;">
      <option value="ov05">⚽ Ov 0.5 PT</option>
      <option value="gg">🤝 GG</option>
      <option value="o25" selected>🔥 Ov 2.5</option>
      <option value="u25">🧊 U 2.5</option>
      <option value="mg13casa">🎯 MG 1-3 Casa</option>
      <option value="mg13ospite">🎯 MG 1-3 Ospite</option>
      <option value="ia">📊 Stats IA</option>
      <option value="players_cards">🟨 Giocatori Cartellini</option>
      <option value="players_shots">⚽ Giocatori Tiri/Gol</option>
      <option value="quote">💎 1X2 Value</option>
      <option value="gz">📈 GZ Index</option>
    </select>
    <input type="text" id="searchInput" class="search-box" placeholder="🔍 Cerca partita o giocatore..." style="background:var(--s2); border:1px solid var(--brd); color:var(--t1); padding:8px 12px; border-radius:8px;">
    <div class="filter-group">
      <label><input type="checkbox" id="filterGZ" checked> GZ</label>
      <label><input type="checkbox" id="filter1X2" checked> 1X2</label>
      <label><input type="checkbox" id="filterDM" checked> DM</label>
    </div>
    <select id="minAffSelect" style="background:var(--s2); border:1px solid var(--brd); color:var(--t1); padding:8px; border-radius:8px;">
      <option value="1">Aff 1+</option><option value="2">Aff 2+</option><option value="3" selected>Aff 3+</option><option value="4">Aff 4+</option><option value="5">Aff 5</option>
    </select>
    <button class="btn" id="exportCsvBtn">📄 CSV</button>
    <button class="btn" id="exportPdfBtn">📑 PDF</button>
    <button class="btn btn-primary" id="addToHistoryBtn">➕ Aggiungi a storico</button>
  </div>

  <!-- Layout Principale -->
  <div class="main-layout">
    <div class="table-wrapper">
      <div style="overflow-x:auto;">
        <table class="match-table" id="matchTable">
          <thead>
            <tr><th>Ora</th><th>Partita</th><th>Score</th><th>Aff</th><th>Conferme</th></tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div id="noResultsMsg" style="text-align:center; padding:40px; color:var(--t3); display:none;">Nessun risultato con i filtri attuali.</div>
    </div>
    <div class="detail-panel" id="detailPanel">
      <div style="color:var(--t3); text-align:center; padding:20px;">Seleziona una partita per vedere i dettagli</div>
    </div>
  </div>
</div>

<script>
(function(){
  // ==================== STATO GLOBALE (identico all'originale) ====================
  const ST = {
    ov05:[], ggov25:[], mg13:[], ia:[], plCards:[], plShots:[], gz:[], quoteValore:[], dataMining:[],
    history: JSON.parse(localStorage.getItem('ma_single_history')||'[]'),
    backtestStats: { ov05: { correct: 0, total: 0 }, gg: { correct: 0, total: 0 }, o25: { correct: 0, total: 0 }, u25: { correct: 0, total: 0 }, mg13: { correct: 0, total: 0 } },
    // Filtri UI
    currentMarket: 'o25',
    filters: { search: '', minAff: 3, requireGZ: true, require1X2: true, requireDM: true },
    selectedRow: null,
    cache: new Map(),
    // stati temporanei per le funzioni originali
    sub:'all', iaCat:'all', plSub:'cards', league:'all', sortMode:'score', q:'',
    quoteFilter:'all', gzFilter:'all', gzSort:'value', det:null, detMarket:null
  };

  const DATASETS = [
    {key:'ov05',label:'Ov 0.5PT',hint:'IND / Delta / U5 / COv0.5'},
    {key:'ggov25',label:'GG + Ov/U 2.5',hint:'IGBc / IGBo / IGBt / MGE'},
    {key:'mg13',label:'MG 1-3',hint:'ICH / ICA / Var / MGF'},
    {key:'ia',label:'Stats IA',hint:'TT / TIP / Corner / Falli / FG'},
    {key:'plCards',label:'Giocatori Cartellini',hint:'Tackle / Falli / Amm.'},
    {key:'plShots',label:'Giocatori Tiri/Gol',hint:'TT / TiP / Gol'},
    {key:'quoteValore',label:'Quote Valore 1X2',hint:'T1/TX/T2 + Spread'},
    {key:'gz',label:'GZ Index',hint:'GZ / IGB / MGE / Diff'},
    {key:'dataMining',label:'DataMining Plus',hint:'NP, % mercati, quote, RE'}
  ];

  // ==================== HELPER (identici all'originale) ====================
  function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
  function timeVal(ora){if(!ora)return 9999;const m=String(ora).match(/(\d{1,2}):(\d{2})/);if(!m)return 9999;return parseInt(m[1])*60+parseInt(m[2]);}
  function sortTime(a,b){return timeVal(a.ora)-timeVal(b.ora);}
  function normName(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,' ').replace(/\s+/g,' ').trim();}
  function dots(a){let h='';for(let i=1;i<=5;i++){const on=i<=a;const c=on?(a>=4?'var(--grn)':a===3?'var(--amb)':'var(--t3)'):'var(--s3)';h+=`<div class="aff-d" style="width:8px;height:8px;border-radius:50%;background:${c};"></div>`;}return h;}
  function affBadge(aff){return `<div style="display:flex;align-items:center;gap:6px;"><div style="display:flex;gap:3px;">${dots(aff)}</div><span>${aff}/5</span></div>`;}
  function fmt(n,d=2){if(n===null||n===undefined||Number.isNaN(n))return 'N/D';return Number(n).toFixed(d);}
  function parseCsvLines(t){return t.replace(/^\uFEFF/,'').trim().replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');}
  function splitCsvLine(line, sep){const out=[];let cur='';let q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(q&&line[i+1]==='"'){cur+='"';i++;}else q=!q;}else if(ch===sep&&!q){out.push(cur);cur='';}else cur+=ch;} out.push(cur); return out;}

  // ==================== PARSING (COMPLETO - IDENTICO ALL'ORIGINALE) ====================
  function parseOv05(t){const L=parseCsvLines(t);if(L.length<2)return[];const sep=L[0].includes(';')?';':',';const s=x=>(x||'').replace(/^"|"$/g,'').trim();const h=splitCsvLine(L[0],sep).map(s);const hi={};h.forEach((x,i)=>hi[x]=i);const g=(r,k)=>s(r[hi[k]]||'');const pf=x=>parseFloat((x||'0').replace(',','.').replace('%',''))||0;const pu=x=>{if(!x)return[0,0];const p=x.split('|').map(v=>parseInt(v)||0);return[p[0]||0,p[1]||0]};const R=[];for(let i=1;i<L.length;i++){const f=splitCsvLine(L[i],sep).map(s);if(f.length<5)continue;R.push({ora:g(f,'ORA'),evento:g(f,'EVENTO'),rpt:g(f,'Rpt'),ind:parseInt(g(f,'IND'))||999,qrOv05:pf(g(f,'QROv0.5pt')),delta:pf(g(f,'Delta')),u5:pu(g(f,'U5[C|O]')),u5ct:pu(g(f,'U5CT[C|O]')),diff:pf(g(f,'Diff')),mge:pf(g(f,'MGE')),cov05:pf(g(f,'COv0.5%')),oov05:pf(g(f,'OOv0.5%')),qrGG:pf(g(f,'QrGG')),qrO25:pf(g(f,'QrO25')),u5Raw:g(f,'U5[C|O]'),u5ctRaw:g(f,'U5CT[C|O]'),cov05R:g(f,'COv0.5%'),oov05R:g(f,'OOv0.5%')});}return R;}
  function parseGGOv25(t){const L=parseCsvLines(t);if(L.length<2)return[];const sep=L[0].includes(';')?';':',';const s=x=>(x||'').replace(/^"|"$/g,'').trim();const h=splitCsvLine(L[0],sep).map(s);const hi={};h.forEach((x,i)=>hi[x]=i);const g=(r,k)=>s(r[hi[k]]||'');const pf=x=>parseFloat((x||'0').replace(',','.').replace('%',''))||0;const R=[];for(let i=1;i<L.length;i++){const f=splitCsvLine(L[i],sep).map(s);if(f.length<5)continue;let oR=g(f,'ORA'),ev=g(f,'EVENTO');const tm=oR.match(/(\d{1,2}:\d{2})/),dt=oR.match(/(\d{2}-\d{2})/);const oD=(dt?dt[1].replace('-','/')+' ':'')+(tm?tm[1]:'');ev=ev.split(/\s{3,}/)[0]||ev;R.push({ora:oD.trim(),evento:ev,nazione:g(f,'NAZIONE'),lega:g(f,'LEGA')||g(f,'NAZIONE'),rpt:g(f,'RIS.'),igbc:parseInt(pf(g(f,'IGBc'))),igbo:parseInt(pf(g(f,'IGBo'))),igbt:parseInt(pf(g(f,'IGBt'))),mge:pf(g(f,'MGE')),diff:pf(g(f,'Diff')),pgg:pf(g(f,'PGG')),s12:parseInt(pf(g(f,'S1-S2'))),qov25:pf(g(f,'qOv2.5'))});}return R;}
  function parseMG13(t){const L=parseCsvLines(t);if(L.length<2)return[];const sep=L[0].includes(';')?';':',';const s=x=>(x||'').replace(/^"|"$/g,'').trim();const h=splitCsvLine(L[0],sep).map(s);const hi={};h.forEach((x,i)=>hi[x]=i);const g=(r,k)=>s(r[hi[k]]||'');const pf=x=>parseFloat((x||'0').replace(',','.'))||0;const R=[];for(let i=1;i<L.length;i++){const f=splitCsvLine(L[i],sep).map(s);if(f.length<5)continue;R.push({ora:g(f,'ORA'),evento:g(f,'EVENTO'),rpt:g(f,'R'),ich:parseInt(pf(g(f,'ICH'))),varc:pf(g(f,'VarC')),vu5c:pf(g(f,'VU5C')),ritc:parseInt(pf(g(f,'RitC'))),mgfc:pf(g(f,'MGFC')),mgso:pf(g(f,'MGSO')),q1:pf(g(f,'Q1')),qo25:pf(g(f,'QO25')),q2:pf(g(f,'Q2')),ica:parseInt(pf(g(f,'ICA'))),varo:pf(g(f,'VarO')),vu5o:pf(g(f,'VU5O')),rito:parseInt(pf(g(f,'RitO'))),mgfo:pf(g(f,'MGFO')),mgsc:pf(g(f,'MGSC'))});}return R;}
  function parseIA(t){const L=parseCsvLines(t);if(L.length<2)return[];const sep=L[0].includes(',')?',':';';const s=x=>(x||'').replace(/^"|"$/g,'').trim();const h=splitCsvLine(L[0],sep).map(s);const hi={};h.forEach((x,i)=>hi[x]=i);const g=(r,k)=>s(r[hi[k]]||'');const pf=x=>parseFloat((x||'').replace(',','.'))||0;const R=[];for(let i=1;i<L.length;i++){const f=splitCsvLine(L[i],sep).map(s);if(f.length<5)continue;let oR=g(f,'DATA EV.');const tm=oR.match(/(\d{1,2}:\d{2})/),dt=oR.match(/(\d{2}-\d{2})/);const ora=(dt?dt[1].replace('-','/')+' ':'')+(tm?tm[1]:'');const r={ora:ora.trim(),nazione:g(f,'NAZIONE'),lega:g(f,'LEGA'),evento:g(f,'EVENTO'),rpt:g(f,'RIS.'),stats:[]};const cats=[['TT','Tiri Totali',g(f,'TT1X2'),pf(g(f,'TTaff'))],['TIP','Tiri in Porta',g(f,'TIP1X2'),pf(g(f,'TIPaff'))],['COR','Corner',g(f,'Cor1X2'),pf(g(f,'CorAff'))],['FAL','Falli',g(f,'Fal1X2'),pf(g(f,'FalAff'))],['FG','Fuorigioco',g(f,'FG1X2'),pf(g(f,'FGaff'))]];cats.forEach(([k,label,pred,aff])=>{if(pred)r.stats.push({key:k,label,pred,aff});});r.highCount=r.stats.filter(s=>s.aff>=2.5).length;r.maxAff=r.stats.length?Math.max(...r.stats.map(s=>s.aff)):0;r.avgAff=r.stats.length?r.stats.reduce((s,x)=>s+x.aff,0)/r.stats.length:0;R.push(r);}return R;}

  // ==================== CALCOLO RISULTATI FILTRATI ====================
  function computeResultsForMarket(market) {
    let rows = [];
    switch(market) {
      case 'ov05': rows = getOv05Rows(); break;
      case 'gg': rows = getGgRows(); break;
      case 'o25': rows = getO25Rows(); break;
      case 'u25': rows = getU25Rows(); break;
      case 'mg13casa': rows = getMgRows('casa'); break;
      case 'mg13ospite': rows = getMgRows('ospite'); break;
      case 'ia': rows = getIaRows(); break;
      case 'players_cards': rows = getPlayerRows('cards'); break;
      case 'players_shots': rows = getPlayerRows('shots'); break;
      case 'quote': rows = getQuoteRows(); break;
      case 'gz': rows = getGzRows(); break;
      default: rows = [];
    }
    const maxScore = Math.max(...rows.map(r=>r.score||0), 1);
    rows = rows.map(r => ({...r, normScore: ((r.score||0) / maxScore) * 100}));
    return rows;
  }

  function getFilteredResults() {
    const cacheKey = `${ST.currentMarket}_${JSON.stringify(ST.filters)}`;
    if (ST.cache.has(cacheKey)) return ST.cache.get(cacheKey);
    let rows = computeResultsForMarket(ST.currentMarket);
    rows = rows.filter(r => {
      if ((r.aff||0) < ST.filters.minAff) return false;
      if (ST.filters.search) {
        const hay = (r.evento||r.match||r.nome||'').toLowerCase();
        if (!hay.includes(ST.filters.search.toLowerCase())) return false;
      }
      if (ST.filters.requireGZ && !r.gzAlign?.aligned) return false;
      if (ST.filters.require1X2 && !(r.qvAlign && marketSupportsQuote(ST.currentMarket, r.qvAlign))) return false;
      if (ST.filters.requireDM && !r.dm) return false;
      return true;
    });
    ST.cache.set(cacheKey, rows);
    return rows;
  }

  // ==================== RENDERING ====================
  function renderTable() {
    const rows = getFilteredResults();
    const tbody = document.getElementById('tableBody');
    const noMsg = document.getElementById('noResultsMsg');
    if (rows.length === 0) {
      tbody.innerHTML = '';
      noMsg.style.display = 'block';
      return;
    }
    noMsg.style.display = 'none';
    let html = '';
    rows.forEach((r, idx) => {
      const name = r.evento || r.match || r.nome || '';
      const ora = r.ora || '';
      const aff = r.aff || 1;
      const normScore = r.normScore || 0;
      const badges = [];
      if (r.m1) badges.push('<span class="badge">M1</span>');
      if (r.gzAlign?.aligned) badges.push('<span class="badge">GZ</span>');
      if (r.qvAlign && marketSupportsQuote(ST.currentMarket, r.qvAlign)) badges.push('<span class="badge">1X2</span>');
      if (r.dm) badges.push(dmBadgeHtml(r.dm, ST.currentMarket) + valueBadgeHtml(r.dm, ST.currentMarket));
      const affDots = Array(5).fill(0).map((_,i)=>`<span class="dot ${i<aff?'filled':''}"></span>`).join('');
      html += `<tr data-index="${idx}" onclick="window.selectRow(${idx})">
        <td>${escapeHtml(ora)}</td>
        <td>${escapeHtml(name)}</td>
        <td>
          <div style="display:flex; align-items:center; gap:6px;">
            <span style="min-width:45px;">${Math.round(normScore)}</span>
            <div class="score-bar"><div class="score-fill" style="width:${normScore}%;"></div></div>
          </div>
        </td>
        <td><div class="aff-dots">${affDots}</div></td>
        <td>${badges.join(' ')}</td>
      </tr>`;
    });
    tbody.innerHTML = html;
    if (ST.selectedRow !== null) {
      const prevSelected = document.querySelector(`tr[data-index="${ST.selectedRow}"]`);
      if (prevSelected) prevSelected.classList.add('selected');
    }
  }

  window.selectRow = function(idx) {
    const rows = getFilteredResults();
    const row = rows[idx];
    if (!row) return;
    ST.selectedRow = idx;
    renderTable();
    renderDetail(row);
  };

  function renderDetail(row) {
    const panel = document.getElementById('detailPanel');
    let breakdownHtml = '';
    if (row.breakdown) {
      breakdownHtml = `<div class="bk"><div style="font-weight:600; margin-bottom:8px;">Breakdown punteggio</div>`;
      row.breakdown.forEach(x => { breakdownHtml += `<div class="breakdown-item"><span>${escapeHtml(x.n)}</span><span>+${fmt(x.p,2)}</span></div>`; });
      breakdownHtml += `<div class="breakdown-item" style="font-weight:700;"><span>Totale</span><span>${fmt(row.originalScore||row.score,2)}</span></div></div>`;
    }
    let dmHtml = '';
    if (row.dm) {
      dmHtml = `<div class="bk"><div style="font-weight:600; margin-bottom:8px;">📈 DataMining (NP: ${row.dm.np})</div>`;
      dmHtml += `<div>1: ${row.dm.p1.toFixed(0)}% / ${row.dm.q1.toFixed(2)} | X: ${row.dm.pX.toFixed(0)}% / ${row.dm.qX.toFixed(2)} | 2: ${row.dm.p2.toFixed(0)}% / ${row.dm.q2.toFixed(2)}</div>`;
      dmHtml += `<div>OV25: ${row.dm.pOV25.toFixed(0)}% / ${row.dm.qOV25.toFixed(2)} | UN35: ${row.dm.pUN35.toFixed(0)}% / ${row.dm.qUN35.toFixed(2)}</div>`;
      dmHtml += `</div>`;
    }
    panel.innerHTML = `
      <div class="detail-title">${escapeHtml(row.evento||row.match||row.nome)}</div>
      <div class="detail-section">
        <div class="detail-label">Score normalizzato</div>
        <div class="detail-value">${Math.round(row.normScore)}/100</div>
      </div>
      <div class="detail-section">
        <div class="detail-label">Affidabilità</div>
        ${affBadge(row.aff)}
      </div>
      ${dmHtml}
      ${breakdownHtml}
    `;
  }

  // ==================== UPLOAD E PERSISTENZA ====================
  const DATA_STORAGE_PREFIX='ma_dataset_';
  function datasetStorageKey(key){return `${DATA_STORAGE_PREFIX}${key}`;}
  function saveDatasetState(key){try{localStorage.setItem(datasetStorageKey(key),JSON.stringify(ST[key]||[]));}catch(e){}}
  function loadDatasetState(key){try{return JSON.parse(localStorage.getItem(datasetStorageKey(key))||'[]');}catch(e){return [];}}
  function clearDatasetState(key){try{localStorage.removeItem(datasetStorageKey(key));}catch(e){}}
  function restoreDatasets(){DATASETS.forEach(d=>{const rows=loadDatasetState(d.key); if(Array.isArray(rows)&&rows.length) ST[d.key]=rows;}); updateDatasetSummary();}
  function parseAndStore(key,text){
    const map={ov05:parseOv05,ggov25:parseGGOv25,mg13:parseMG13,ia:parseIA,plCards:parsePlCards,plShots:parsePlShots,quoteValore:parseQuoteValore,gz:parseGZ,dataMining:parseDataMining};
    if(!map[key])throw new Error('Dataset non gestito');
    const data=map[key](text); ST[key]=Array.isArray(data)?data:[];
    saveDatasetState(key);
    ST.cache.clear();
    updateDatasetSummary();
    renderTable();
  }
  async function handleUploadInput(input){
    const key=input?.dataset?.target; const file=input?.files?.[0];
    if(!key||!file)return;
    try{
      const raw=await file.text();
      if(!raw||!raw.trim()) throw new Error('File vuoto');
      parseAndStore(key,raw);
    }catch(err){ alert('Errore nel parsing del CSV.'); }
    finally{input.value='';}
  }
  function renderUploadGrid(){
    const el=document.getElementById('uploadGrid');
    el.innerHTML=DATASETS.map((d,i)=>{
      const n=ST[d.key]?.length||0; const inputId=`file_${d.key}_${i}`;
      return `<div class="upload-card">
        <input type="file" id="${inputId}" accept=".csv,text/csv" data-target="${d.key}" style="display:none;" onchange="window.handleUploadInput(this)">
        <div class="upload-lbl">${d.label}</div>
        <div class="upload-meta">${n?`<span class="loaded">${n} righe</span>`:'Nessun dato'}<small>${d.hint}</small></div>
        <div class="upload-actions">
          <button class="pick-btn" onclick="document.getElementById('${inputId}').click()">📂 Seleziona</button>
          ${n?`<button class="clear-btn" onclick="window.clearDataset('${d.key}')">Reset</button>`:''}
        </div>
      </div>`;
    }).join('');
  }
  window.handleUploadInput = handleUploadInput;
  window.clearDataset = function(key){ clearDatasetState(key); ST[key]=[]; ST.cache.clear(); renderUploadGrid(); renderTable(); updateDatasetSummary(); };
  function updateDatasetSummary(){
    const total = DATASETS.reduce((s,d)=>s+(ST[d.key]?.length||0),0);
    document.getElementById('hdrInfo').textContent = `${total} righe caricate · Mercato: ${document.getElementById('marketSelect').selectedOptions[0].text}`;
  }

  // ==================== ESPORTAZIONE ====================
  function exportCsv(){
    const rows = getFilteredResults();
    if(!rows.length) return alert('Nessun dato.');
    const headers = ['Ora','Partita','Score','Aff','Conferme'];
    const csvRows = rows.map(r=>[r.ora||'', r.evento||r.match||r.nome||'', Math.round(r.normScore), r.aff||'', [r.m1?'M1':'', r.gzAlign?.aligned?'GZ':'', r.qvAlign?'1X2':'', r.dm?'DM':''].filter(Boolean).join(' ')]);
    const csvContent = [headers, ...csvRows].map(row=>row.map(cell=>`"${String(cell).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['\uFEFF'+csvContent], {type:'text/csv;charset=utf-8;'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'match_analyzer.csv'; a.click();
  }
  function exportPdf(){
    const rows = getFilteredResults();
    if(!rows.length) return alert('Nessun dato.');
    const jspdf = window.jspdf; if(!jspdf?.jsPDF) return;
    const doc = new jspdf.jsPDF({orientation:'portrait',unit:'pt',format:'a4'});
    const title = `Match Analyzer - ${document.getElementById('marketSelect').selectedOptions[0].text}`;
    const head = [['Ora','Partita','Score','Aff','Conferme']];
    const body = rows.map(r=>[r.ora||'', r.evento||r.match||r.nome||'', Math.round(r.normScore), r.aff||'', [r.m1?'M1':'', r.gzAlign?.aligned?'GZ':'', r.qvAlign?'1X2':'', r.dm?'DM':''].filter(Boolean).join(' ')]);
    doc.setFillColor(11,13,18); doc.rect(0,0,595,70,'F'); doc.setTextColor(255,255,255); doc.setFontSize(16); doc.text(title,40,34);
    doc.autoTable({startY:86,head,body,theme:'grid',styles:{fontSize:8},headStyles:{fillColor:[20,23,32]}});
    doc.save(`${title.replace(/\s+/g,'-').toLowerCase()}.pdf`);
  }

  // ==================== STORICO ====================
  function addSelectedToHistory(){
    const rows = getFilteredResults();
    const row = rows[ST.selectedRow];
    if(!row) return alert('Seleziona una partita.');
    const entry = {
      id: Date.now()+'_'+Math.random().toString(36),
      createdAt: new Date().toISOString(),
      match: row.evento||row.match||row.nome,
      market: ST.currentMarket,
      score: row.normScore,
      aff: row.aff,
      status: 'pending'
    };
    ST.history.push(entry);
    localStorage.setItem('ma_single_history', JSON.stringify(ST.history));
    alert('Aggiunto allo storico!');
  }

  // ==================== BINDING ====================
  function bindUI(){
    document.getElementById('datasetToggle').addEventListener('click',()=>{
      const p=document.getElementById('datasetPanel'), a=document.getElementById('toggleArrow');
      p.classList.toggle('open'); a.textContent=p.classList.contains('open')?'▲':'▼';
    });
    document.getElementById('marketSelect').addEventListener('change', e=>{ ST.currentMarket=e.target.value; ST.cache.clear(); renderTable(); updateDatasetSummary(); });
    document.getElementById('searchInput').addEventListener('input', e=>{ ST.filters.search=e.target.value; ST.cache.clear(); renderTable(); });
    document.getElementById('minAffSelect').addEventListener('change', e=>{ ST.filters.minAff=parseInt(e.target.value); ST.cache.clear(); renderTable(); });
    document.getElementById('filterGZ').addEventListener('change', e=>{ ST.filters.requireGZ=e.target.checked; ST.cache.clear(); renderTable(); });
    document.getElementById('filter1X2').addEventListener('change', e=>{ ST.filters.require1X2=e.target.checked; ST.cache.clear(); renderTable(); });
    document.getElementById('filterDM').addEventListener('change', e=>{ ST.filters.requireDM=e.target.checked; ST.cache.clear(); renderTable(); });
    document.getElementById('exportCsvBtn').addEventListener('click', exportCsv);
    document.getElementById('exportPdfBtn').addEventListener('click', exportPdf);
    document.getElementById('addToHistoryBtn').addEventListener('click', addSelectedToHistory);
  }

  // ==================== BACKTEST (OPZIONALE) ====================
  function computeBacktestStats(){
    ST.backtestStats = { ov05: { correct: 0, total: 0 }, gg: { correct: 0, total: 0 }, o25: { correct: 0, total: 0 }, u25: { correct: 0, total: 0 }, mg13: { correct: 0, total: 0 } };
    if (!ST.dataMining.length) return;
    ST.dataMining.forEach(dm => {
      const goals = (dm.r||'').match(/(\d+)\s*-\s*(\d+)/); if(!goals) return;
      const total = parseInt(goals[1])+parseInt(goals[2]);
      const ggRow = getGgRows().find(r=>normName(r.evento)===normName(dm.match));
      const o25Row = getO25Rows().find(r=>normName(r.evento)===normName(dm.match));
      const u25Row = getU25Rows().find(r=>normName(r.evento)===normName(dm.match));
      const mg13Row = getMgRows('casa').find(r=>normName(r.evento)===normName(dm.match));
      if(ggRow&&ggRow.aff>=3){ ST.backtestStats.gg.total++; if(goals[1]>0&&goals[2]>0) ST.backtestStats.gg.correct++; }
      if(o25Row&&o25Row.aff>=3){ ST.backtestStats.o25.total++; if(total>2) ST.backtestStats.o25.correct++; }
      if(u25Row&&u25Row.aff>=3){ ST.backtestStats.u25.total++; if(total<3) ST.backtestStats.u25.correct++; }
      if(mg13Row&&mg13Row.aff>=3){ ST.backtestStats.mg13.total++; if(total>=1&&total<=3) ST.backtestStats.mg13.correct++; }
    });
    const el=document.getElementById('backtestInfo');
    if(el){
      const s=ST.backtestStats;
      el.innerHTML = `📊 Backtest (AFF≥3): O25 ${s.o25.total?((s.o25.correct/s.o25.total)*100).toFixed(1)+'%':'N/D'} | U25 ${s.u25.total?((s.u25.correct/s.u25.total)*100).toFixed(1)+'%':'N/D'} | GG ${s.gg.total?((s.gg.correct/s.gg.total)*100).toFixed(1)+'%':'N/D'} | MG13 ${s.mg13.total?((s.mg13.correct/s.mg13.total)*100).toFixed(1)+'%':'N/D'}`;
    }
  }
  const origParseDataMining = parseDataMining;
  window.parseDataMining = function(t){ const res = origParseDataMining(t); ST.dataMining = res; computeBacktestStats(); return res; };
  parseDataMining = window.parseDataMining;

  function init(){
    restoreDatasets();
    renderUploadGrid();
    bindUI();
    renderTable();
    updateDatasetSummary();
  }
  init();
})();
</script>
</body>
</html>

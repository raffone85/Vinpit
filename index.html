<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0b0d12">
  <title>Match Analyzer Pro – Dashboard Completa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <style>
    /* === STILI COMPLETI (identici all'originale, inclusi modale, dashboard, ecc.) === */
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0b0d12;--s1:#141720;--s2:#1a1e2a;--s3:#252a38;
      --brd:#2d3345;--brd2:#3a4055;
      --t1:#e8ecf4;--t2:#a0a8be;--t3:#6b7490;
      --grn:#4ade80;--grn2:#22c55e;--grn-bg:rgba(74,222,128,.1);
      --amb:#fbbf24;--amb-bg:rgba(251,191,36,.1);
      --red:#f87171;--red-bg:rgba(248,113,113,.08);
      --blu:#60a5fa;--blu-bg:rgba(96,165,250,.1);
      --cyn:#22d3ee;--cyn-bg:rgba(34,211,238,.08);
      --mag:#c084fc;--mag-bg:rgba(192,132,252,.08);
      --org:#fb923c;--org-bg:rgba(251,146,60,.08);
      --M:'IBM Plex Mono',monospace;--S:'DM Sans',sans-serif;
    }
    html{font-size:15px;background:var(--bg)}
    body{
      background:var(--bg);color:var(--t1);font-family:var(--S);
      min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;
      -webkit-text-size-adjust:100%;padding-top:env(safe-area-inset-top);
      padding-bottom:env(safe-area-inset-bottom);
    }
    button,input,select{font:inherit}
    button{border:none;background:none;cursor:pointer}
    .app{max-width:760px;margin:0 auto;padding:16px 14px 110px;background:var(--bg);min-height:100vh;min-height:100dvh}
    .hdr{padding:18px 0 10px;margin-bottom:8px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .hdr h1{font-size:1.35rem;font-weight:700;color:#fff;letter-spacing:-.4px}
    .hdr h1 span{color:var(--grn)}
    .hdr-info{font:500 .8rem var(--S);color:var(--t3)}
    .mtabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .mtabs::-webkit-scrollbar{display:none}
    .mtab{padding:10px 16px;border-radius:24px;font:600 .85rem var(--S);color:var(--t2);border:1px solid var(--brd);background:var(--s1);white-space:nowrap;transition:all .2s;flex-shrink:0}
    .mtab:hover,.mtab:focus-visible{color:var(--t1);border-color:var(--brd2)}
    .mtab.active{background:var(--grn);color:var(--bg);border-color:var(--grn);font-weight:700}
    .panel{background:var(--s1);border:1px solid var(--brd);border-radius:14px;padding:12px;margin-bottom:12px}
    .dataset-toggle{display:flex;align-items:center;justify-content:space-between;padding:8px 0;cursor:pointer;user-select:none}
    .dataset-toggle h3{font-size:1rem;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:6px}
    .dataset-toggle .arrow{font-size:1.2rem;color:var(--t3);transition:transform .2s}
    .dataset-panel{overflow:hidden;transition:max-height .3s ease;max-height:0}
    .dataset-panel.open{max-height:800px}
    .upload-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-top:12px}
    .upload-card{position:relative;padding:14px;border:1.5px dashed var(--brd2);border-radius:12px;background:rgba(255,255,255,.01);min-height:92px;display:flex;flex-direction:column;justify-content:center;gap:6px}
    .upload-card:hover{border-color:var(--grn2);background:rgba(74,222,128,.03)}
    .upload-lbl{font:700 .8rem var(--M);color:#fff}
    .upload-meta{font:500 .82rem var(--S);color:var(--t2);line-height:1.45}
    .upload-meta small{display:block;color:var(--t3)}
    .loaded{color:var(--grn);font-weight:700}
    .clear-btn,.pick-btn{align-self:flex-start;padding:6px 10px;border-radius:8px;background:var(--red-bg);border:1px solid rgba(248,113,113,.25);color:var(--red);font:700 .75rem var(--M);margin-top:4px}
    .pick-btn{background:var(--blu-bg);color:var(--blu);border-color:rgba(96,165,250,.2);margin-right:6px}
    .dashboard{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin:16px 0}
    .dash-card{background:var(--s1);border:1px solid var(--brd);border-radius:16px;padding:16px;transition:all .15s}
    .dash-card h4{font-size:1rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
    .dash-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
    .dash-btn{background:var(--grn);color:var(--bg);border:none;padding:8px 12px;border-radius:8px;font:700 .8rem var(--S);flex:1;min-width:70px}
    .dash-btn.secondary{background:var(--s3);color:var(--t1)}
    .dash-select{background:var(--s2);border:1px solid var(--brd);border-radius:6px;color:var(--t1);padding:6px;font-size:.8rem;width:100%;margin-bottom:8px}
    .result-area{margin-top:20px}
    .sec{display:flex;align-items:center;gap:10px;margin:18px 0 10px;padding-bottom:8px;border-bottom:1.5px solid var(--brd)}
    .tag{padding:5px 12px;border-radius:6px;font:700 .75rem var(--M);letter-spacing:.5px;text-transform:uppercase}
    .tag-m1{background:var(--grn-bg);color:var(--grn)}
    .tag-a{background:var(--blu-bg);color:var(--blu)}
    .tag-b{background:var(--amb-bg);color:var(--amb)}
    .tag-gen{background:var(--cyn-bg);color:var(--cyn)}
    .tag-mg{background:var(--mag-bg);color:var(--mag)}
    .tag-ia{background:var(--org-bg);color:var(--org)}
    .tag-gz{background:rgba(96,165,250,.1);color:var(--blu)}
    .mlist{display:flex;flex-direction:column;gap:6px}
    .mrow{display:grid;grid-template-columns:56px 1fr auto;align-items:center;gap:10px;padding:12px 14px;background:var(--s1);border:1.5px solid transparent;border-radius:12px;cursor:pointer;transition:all .15s}
    .mrow:hover,.mrow:focus-visible{border-color:var(--brd2);background:var(--s2)}
    .m-ora{font:600 .82rem var(--M);color:var(--t2)}
    .m-name{font:600 .95rem var(--S);color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .m-sub{font:.78rem var(--S);color:var(--t3);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap}
    .m-right{display:flex;align-items:center;gap:8px;flex-shrink:0;justify-content:flex-end}
    .m-ind{font:700 .82rem var(--M);padding:4px 10px;border-radius:6px}
    .ind-g{color:var(--grn);background:var(--grn-bg)}
    .ind-o{color:var(--amb);background:var(--amb-bg)}
    .ind-r{color:var(--t3);background:rgba(255,255,255,.04)}
    .badge{padding:3px 8px;border-radius:5px;font:700 .72rem var(--M);border:1px solid transparent;white-space:nowrap}
    .badge.good{background:var(--grn-bg);color:var(--grn);border-color:rgba(74,222,128,.2)}
    .badge.warn{background:var(--amb-bg);color:var(--amb);border-color:rgba(251,191,36,.2)}
    .badge.info{background:var(--blu-bg);color:var(--blu);border-color:rgba(96,165,250,.2)}
    .badge.alt{background:var(--mag-bg);color:var(--mag);border-color:rgba(192,132,252,.2)}
    .badge.neu{background:rgba(255,255,255,.05);color:var(--t2);border-color:rgba(255,255,255,.08)}
    .badge.dm-green{background:rgba(74,222,128,.15);color:var(--grn)}
    .badge.dm-yellow{background:rgba(251,191,36,.1);color:var(--amb)}
    .badge.dm-red{background:rgba(248,113,113,.1);color:var(--red)}
    .badge.value{background:rgba(192,132,252,.15);color:var(--mag)}
    .badge.top-plus{background:rgba(255,215,0,.15);color:#FFD700;font-weight:800}
    .aff{display:flex;align-items:center;gap:3px}
    .aff-d{width:6px;height:6px;border-radius:50%}
    .empty{text-align:center;padding:50px 20px;color:var(--t3);background:var(--s1);border:1px solid var(--brd);border-radius:14px}
    .pickbar{margin-top:6px;display:flex;justify-content:flex-end}
    .pickbtn{background:var(--blu-bg);color:var(--blu);border:1px solid rgba(96,165,250,.2);padding:4px 12px;border-radius:6px;font:700 .75rem var(--M);cursor:pointer}
    .show-more-btn{text-align:center;margin-top:16px}
    .ov{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-end;justify-content:center}
    .det{background:var(--s1);border:1.5px solid var(--brd);border-radius:20px 20px 0 0;max-width:620px;width:100%;max-height:88vh;overflow-y:auto;padding:22px 16px 28px}
    @media(min-width:700px){.det{border-radius:20px;margin-bottom:24px}}
    .det-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
    .det-x{width:36px;height:36px;border-radius:10px;border:1.5px solid var(--brd);background:transparent;color:var(--t2);font-size:1.1rem}
    .result-header{display:flex;justify-content:space-between;align-items:center}
    .status{padding:10px 12px;border-radius:10px;background:var(--bg);color:var(--t2);border:1px solid var(--brd);font:.82rem var(--S)}
    .statsgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
    .statcard{background:var(--s2);padding:12px;border-radius:10px;text-align:center}
    .statcard .k{font-size:.75rem;color:var(--t3);text-transform:uppercase}
    .statcard .v{font-size:1.4rem;font-weight:700;font-family:var(--M)}
    .tablemini{width:100%;border-collapse:collapse;margin:12px 0;font-size:.8rem}
    .tablemini th{color:var(--t3);font-weight:600;text-align:left;padding:6px 4px}
    .tablemini td{padding:6px 4px;border-bottom:1px solid var(--brd)}
    .histrow{background:var(--s1);border-radius:12px;padding:12px;margin-bottom:8px}
    .histtop{display:flex;justify-content:space-between;align-items:flex-start}
    .histname{font-weight:700;color:#fff;margin-bottom:4px}
    .histmeta{display:flex;flex-wrap:wrap;gap:6px;font-size:.75rem;color:var(--t2)}
    .histactions{display:flex;gap:8px;margin-top:12px}
    .mini{padding:6px 12px;border-radius:6px;font-size:.75rem;font-weight:600;background:var(--s3);color:var(--t1)}
    .mini.ok{background:var(--grn-bg);color:var(--grn)}
    .mini.no{background:var(--amb-bg);color:var(--amb)}
    .mini.dim{background:var(--s2);color:var(--t2)}
    .btn.ghost{background:transparent;border:1px solid var(--brd);padding:8px 12px;border-radius:8px;color:var(--t2)}
    .btn.danger{color:var(--red);border-color:var(--red)}
    .dg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
    .dc{background:var(--bg);border-radius:10px;padding:12px;border:1px solid rgba(255,255,255,.03)}
    .dc-l{font:.7rem var(--S);color:var(--t3);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:3px}
    .dc-v{font:700 .98rem var(--M);word-break:break-word}
    .bk{margin-top:14px;padding-top:14px;border-top:1.5px solid var(--brd)}
    .bk-t{font:.75rem var(--S);color:var(--t3);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:8px}
    .bk-r{display:flex;justify-content:space-between;gap:12px;padding:6px 0;font:.85rem var(--S)}
    .bk-tot{display:flex;justify-content:space-between;padding:10px 0 0;margin-top:6px;border-top:1.5px solid var(--brd);font:700 .95rem var(--S)}
    .note{margin-top:8px;color:var(--t3);font:.8rem var(--S);line-height:1.5}
    .prob-bar-container{display:flex;align-items:center;gap:8px;margin:4px 0}
    .prob-bar{flex:1;height:6px;background:var(--s3);border-radius:3px;overflow:hidden}
    .prob-fill{height:100%;background:var(--grn);border-radius:3px}
  </style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div>
      <h1>Match <span>Analyzer</span> Pro</h1>
      <div class="hdr-info" id="hdrInfo">Carica i CSV e usa la dashboard</div>
      <div id="backtestInfo" style="font-size:0.75rem; color:var(--t3); margin-top:4px;"></div>
    </div>
  </div>

  <div class="mtabs" id="mtabs">
    <button class="mtab active" data-m="dashboard">🏠 Dashboard</button>
    <button class="mtab" data-m="storico">📋 Storico</button>
  </div>

  <div class="panel">
    <div class="dataset-toggle" id="datasetToggle">
      <h3><span>📂</span> Gestione Dataset</h3>
      <span class="arrow" id="toggleArrow">▼</span>
    </div>
    <div class="dataset-panel" id="datasetPanel">
      <div class="upload-grid" id="uploadGrid"></div>
      <div class="footer-note">File supportati: CSV con separatore ; oppure , . DataMining Plus fornisce NP, %, quote e RE.</div>
    </div>
  </div>

  <div id="main"></div>
  <div id="detM"></div>
</div>

<script>
(function(){
  // ==================== STATO GLOBALE ====================
  const ST = {
    market: 'dashboard',
    dashMarket: null, dashSub: null, dashList: [], showAll: false,
    q: '',
    ov05:[], ggov25:[], mg13:[], ia:[], plCards:[], plShots:[], gz:[], quoteValore:[], dataMining:[],
    history: [],
    histStatus:'all', histCategory:'all',
    backtestStats: { ov05: { correct: 0, total: 0 }, gg: { correct: 0, total: 0 }, o25: { correct: 0, total: 0 }, u25: { correct: 0, total: 0 }, mg13: { correct: 0, total: 0 } },
    det: null, detMarket: null, detSide: null,
    sub: 'all', iaCat: 'all', plSub: 'cards', league: 'all', sortMode: 'score',
    quoteFilter: 'all', gzFilter: 'all', gzSort: 'value'
  };

  const svgPDF = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
  const DATASETS = [
    {key:'ov05',label:'Ov 0.5PT',hint:'IND / Delta / U5 / COv0.5'},
    {key:'ggov25',label:'GG + Ov/U 2.5',hint:'IGBc / IGBo / IGBt / MGE'},
    {key:'mg13',label:'MG 1-3',hint:'ICH / ICA / Var / MGF'},
    {key:'ia',label:'Stats IA',hint:'TT / TIP / Corner / Falli / FG'},
    {key:'plCards',label:'Giocatori Cartellini',hint:'Tackle / Falli / Amm.'},
    {key:'plShots',label:'Giocatori Tiri/Gol',hint:'TT / TiP / Gol'},
    {key:'quoteValore',label:'Quote Valore 1X2',hint:'T1/TX/T2 + Spread'},
    {key:'gz',label:'GZ Index',hint:'GZ / IGB / MGE / Diff'},
    {key:'dataMining',label:'DataMining Plus',hint:'NP, % mercati, quote, RE'}
  ];

  // ==================== HELPER ====================
  function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
  function timeVal(ora){if(!ora)return 9999;const m=String(ora).match(/(\d{1,2}):(\d{2})/);if(!m)return 9999;return parseInt(m[1])*60+parseInt(m[2]);}
  function sortTime(a,b){return timeVal(a.ora)-timeVal(b.ora);}
  function normName(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,' ').replace(/\s+/g,' ').trim();}
  function dots(a,sz){let h='';const s=sz==='lg'?9:6;for(let i=1;i<=5;i++){const on=i<=a;const c=on?(a>=4?'var(--grn)':a===3?'var(--amb)':'var(--t3)'):'var(--s3)';h+=`<div class="aff-d" style="width:${s}px;height:${s}px;background:${c}"></div>`;}return h;}
  function affBadge(aff){return `<div class="aff"><div>${dots(aff)}</div><div class="aff-n aff-${aff}">${aff}/5</div></div>`;}
  function indB(v,t){if(v===null||v===undefined||v==='')return `<div class="m-ind ind-r">N/D</div>`; if(t==='ov05'){const c=v<=320?'ind-g':v<=340?'ind-o':'ind-r';return `<div class="m-ind ${c}">${v}</div>`;} if(t==='igbt'){const c=v>=350?'ind-g':v>=300?'ind-o':'ind-r';return `<div class="m-ind ${c}">${v}</div>`;} if(t==='mg'){const c=v<=320?'ind-g':v<=350?'ind-o':'ind-r';return `<div class="m-ind ${c}">${v}</div>`;} return `<div class="m-ind ind-r">${v}</div>`;}
  function filt(list){if(!ST.q)return list;const q=ST.q.toLowerCase();return list.filter(r=>[r.evento,r.nome,r.partita,r.squadra,r.match,r.lega,r.nazione].filter(Boolean).join(' ').toLowerCase().includes(q));}
  function filtLeague(list,key){let r=filt(list);if(ST.league!=='all'&&key)r=r.filter(x=>String(x[key]||'').trim()===ST.league);return r;}
  function diffLabel(d){if(d===null||d===undefined||isNaN(d))return ['N/D','n'];if(d===0)return ['0.00','n'];const v=(d>0?'+':'')+d.toFixed(2);const tag=d<0?' (sotto)':d>0.5?' (sovra+)':d>0?' (sovra)':'';const c=d<0?'g':d>0.5?'w':'n';return [v+tag,c];}
  function getLeagueOptions(data,key){const vals=[...new Set(data.map(r=>String(r[key]||'').trim()).filter(v=>v&&v.length>1))].sort((a,b)=>a.localeCompare(b));return vals;}
  function fmt(n,d=2){if(n===null||n===undefined||Number.isNaN(n))return 'N/D';return Number(n).toFixed(d);}
  function parseCsvLines(t){return t.replace(/^\uFEFF/,'').trim().replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');}
  function splitCsvLine(line, sep){const out=[];let cur='';let q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(q&&line[i+1]==='"'){cur+='"';i++;}else q=!q;}else if(ch===sep&&!q){out.push(cur);cur='';}else cur+=ch;} out.push(cur); return out;}

  function parseOv05(t){const L=parseCsvLines(t);if(L.length<2)return[];const sep=L[0].includes(';')?';':',';const s=x=>(x||'').replace(/^"|"$/g,'').trim();const h=splitCsvLine(L[0],sep).map(s);const hi={};h.forEach((x,i)=>hi[x]=i);const g=(r,k)=>s(r[hi[k]]||'');const pf=x=>parseFloat((x||'0').replace(',','.').replace('%',''))||0;const pu=x=>{if(!x)return[0,0];const p=x.split('|').map(v=>parseInt(v)||0);return[p[0]||0,p[1]||0]};const R=[];for(let i=1;i<L.length;i++){const f=splitCsvLine(L[i],sep).map(s);if(f.length<5)continue;R.push({ora:g(f,'ORA'),evento:g(f,'EVENTO'),rpt:g(f,'Rpt'),ind:parseInt(g(f,'IND'))||999,qrOv05:pf(g(f,'QROv0.5pt')),delta:pf(g(f,'Delta')),u5:pu(g(f,'U5[C|O]')),u5ct:pu(g(f,'U5CT[C|O]')),diff:pf(g(f,'Diff')),mge:pf(g(f,'MGE')),cov05:pf(g(f,'COv0.5%')),oov05:pf(g(f,'OOv0.5%')),qrGG:pf(g(f,'QrGG')),qrO25:pf(g(f,'QrO25')),u5Raw:g(f,'U5[C|O]'),u5ctRaw:g(f,'U5CT[C|O]'),cov05R:g(f,'COv0.5%'),oov05R:g(f,'OOv0.5%')});}return R;}

  function parseGoalsFromResult(r) { if (!r) return null; const match = r.match(/(\d+)\s*-\s*(\d+)/); if (!match) return null; return { home: parseInt(match[1]), away: parseInt(match[2]), total: parseInt(match[1]) + parseInt(match[2]) }; }
  function computeBacktestStats() {
    ST.backtestStats = { ov05: { correct: 0, total: 0 }, gg: { correct: 0, total: 0 }, o25: { correct: 0, total: 0 }, u25: { correct: 0, total: 0 }, mg13: { correct: 0, total: 0 } };
    if (!ST.dataMining.length) return;
    ST.dataMining.forEach(dm => {
      const goals = parseGoalsFromResult(dm.r); if (!goals) return;
      const ggRow = getGgRows().find(r => normName(r.evento) === normName(dm.match));
      const o25Row = getO25Rows().find(r => normName(r.evento) === normName(dm.match));
      const u25Row = getU25Rows().find(r => normName(r.evento) === normName(dm.match));
      const mg13Row = getMgRows().find(r => normName(r.evento) === normName(dm.match));
      if (ggRow && ggRow.aff >= 3) { ST.backtestStats.gg.total++; if (goals.home > 0 && goals.away > 0) ST.backtestStats.gg.correct++; }
      if (o25Row && o25Row.aff >= 3) { ST.backtestStats.o25.total++; if (goals.total > 2) ST.backtestStats.o25.correct++; }
      if (u25Row && u25Row.aff >= 3) { ST.backtestStats.u25.total++; if (goals.total < 3) ST.backtestStats.u25.correct++; }

    });
  }

  function buildHubMatchMap(){
    const map={}; const ensure=(evento,ora='')=>{const k=normName(evento);if(!k)return null;if(!map[k])map[k]={key:k,evento:evento,ora:ora,ov05:null,gg:null,o25:null,u25:null,mg13:null,ia:null,qv:null,gz:null,dm:null};return map[k];};

    getO25Rows().forEach(r=>{const m=ensure(r.evento,r.ora);if(m&&!m.o25)m.o25=r;});
    getU25Rows().forEach(r=>{const m=ensure(r.evento,r.ora);if(m&&!m.u25)m.u25=r;});
    getMgRows().forEach(r=>{const m=ensure(r.evento,r.ora);if(m&&!m.mg13)m.mg13={...r,aff:Math.max(r.house.aff,r.away.aff),score:Math.max(r.house.total,r.away.total)};});

    ST.quoteValore.forEach(r=>{const m=ensure(r.match,r.ora);if(m&&!m.qv)m.qv={...r,...analyzeQuoteMatch(r)};});
    ST.gz.forEach(r=>{const m=ensure(r.evento,r.ora);if(m&&!m.gz)m.gz={...r,prob:gzProbability(r.gz)};});
    ST.dataMining.forEach(r=>{const m=ensure(r.match,r.ora);if(m&&!m.dm)m.dm=r;});
    const rows=[]; for(const m of Object.values(map)){
      const gzOver=!!(m.gz&&m.gz.prob.type==='over'), gzUnder=!!(m.gz&&m.gz.prob.type==='under'), gzMid=!!(m.gz&&m.gz.prob.type==='neutral');
      const qvForGoals=!!(m.qv&&['casa','ospite','entrambe'].includes(m.qv.golSide)), qvBoth=!!(m.qv&&m.qv.golSide==='entrambe'), qvTight=!!(m.qv&&m.qv.golSide==='pareggio');
      let coverage=[m.ov05,m.gg||m.o25||m.u25,m.qv,m.gz,m.dm].filter(Boolean).length; if(m.dm && m.dm.np>=30) coverage++;
      let conflicts=(m.o25&&gzUnder?1:0)+(m.u25&&gzOver?1:0)+(m.gg&&m.qv&&m.qv.golSide==='pareggio'?1:0);
      if(m.dm){ if(m.o25&&m.o25.aff>=4&&m.dm.pOV25<45) conflicts++; if(m.u25&&m.u25.aff>=4&&m.dm.pUN35<60) conflicts++; if(m.gg&&m.gg.aff>=4&&m.dm.pGG<45) conflicts++; }
      const conv=(m.gz?1:0)+(m.qv?1:0)+(m.ia&&m.ia.avgAff>=2.5?1:0); const h={...m,gzOver,gzUnder,gzMid,qvForGoals,qvBoth,qvTight,coverage,conflicts,conv};

  }

  function hubAdvice(h){
    const tips=[]; const hasTopPlusPotential = h.coverage >= 4 && h.conflicts === 0 && h.dm && h.dm.np >= 40;
    if(h.o25&&h.o25.aff>=4&&h.gzOver&&h.qvForGoals) tips.push({market:'Ov 2.5', tier: hasTopPlusPotential?'TOP+':'TOP', score:(h.o25?.score||0)+(h.conv||0)+(hasTopPlusPotential?0.5:0), reason:'IGBt e MGE forti con conferma GZ over e 1X2 coerente'});

    if(h.mg13&&h.mg13.aff>=4) tips.push({market:'MG 1-3', tier: hasTopPlusPotential?'TOP+':'SMART', score:(h.mg13?.score||0)+(h.gzMid?0.4:0)+(h.qvTight?0.3:0)+(hasTopPlusPotential?0.3:0), reason:'Mercato mirato per match controllato o equilibrio'});
    if(!tips.length){
      if(h.o25&&h.o25.aff>=4) tips.push({market:'Ov 2.5',tier:'WATCH',score:(h.o25?.score||0)+(h.gzOver?0.4:0),reason:'Buon segnale statistico, manca convergenza totale'});
      if(h.gg&&h.gg.aff>=4) tips.push({market:'GG',tier:'WATCH',score:(h.gg?.score||0)+(h.gzOver?0.3:0),reason:'GG interessante ma non completamente confermato'});
      if(h.ov05&&h.ov05.aff>=4) tips.push({market:'Ov 0.5 PT',tier:'SAFE',score:(h.ov05?.score||0)+(h.gzOver?0.4:0),reason:'Linea prudente anche senza piena convergenza'});

      else if(h.o25) tips.push({market:'Ov 2.5',tier:'LIGHT',score:h.o25?.score||0,reason:'Segnale principale disponibile sul match'});
      else if(h.u25) tips.push({market:'U 2.5',tier:'LIGHT',score:h.u25?.score||0,reason:'Segnale principale disponibile sul match'});

    return {tips,main,alt,risk,summary};

  function renderExactScoresWithBars(reString) {

    return `<div class="bk"><div class="bk-t">🔮 Risultati esatti più probabili</div>` + items.map(it => { const barWidth = (it.perc / maxPerc) * 100; return `<div class="prob-bar-container"><div class="n" style="min-width:40px;">${it.score}</div><div class="prob-bar"><div class="prob-fill" style="width:${barWidth}%;"></div></div><div class="p pos" style="min-width:45px;text-align:right;">${it.perc.toFixed(1)}%</div></div>`; }).join('') + `</div>`;

  function loadDatasetState(key){try{return JSON.parse(localStorage.getItem(datasetStorageKey(key))||'[]');}catch(e){return [];}}

  function parseAndStore(key,text){
    const map={ov05:parseOv05,ggov25:parseGGOv25,mg13:parseMG13,ia:parseIA,plCards:parsePlCards,plShots:parsePlShots,quoteValore:parseQuoteValore,gz:parseGZ,dataMining:parseDataMining};

    saveDatasetState(key);
    if(key==='plCards'&&ST.market==='players'&&ST.plSub==='shots'&&!ST.plShots.length)ST.plSub='cards';

  function setUploadStatus(msg,type=''){

  }
  function readFileAsText(file){
    if(file && typeof file.text==='function') return file.text();
    return new Promise((resolve,reject)=>{ const fr=new FileReader(); fr.onload=()=>resolve(String(fr.result||'')); fr.onerror=()=>reject(fr.error||new Error('Lettura file non riuscita')); fr.readAsText(file); });
  }
  async function handleUploadInput(input){
    const key=input?.dataset?.target; const file=input?.files?.[0];
    if(!key){setUploadStatus('Upload non valido: target mancante.','err');return;}
    if(!file){setUploadStatus(`Nessun file selezionato per ${key}.`,'err');return;}
    setUploadStatus(`Lettura file ${file.name} in corso...`);
    try{
      const raw=await readFileAsText(file); if(!raw||!raw.trim()) throw new Error('File vuoto o non leggibile');
      parseAndStore(key,raw); const count=Array.isArray(ST[key])?ST[key].length:0;
      if(!count) throw new Error('CSV letto ma nessuna riga valida trovata');
      setUploadStatus(`Caricato ${file.name} in ${key}. Righe valide: ${count}.`,'ok');
    }catch(err){ console.error(err); setUploadStatus(`Errore su ${file?.name||'file'} (${key}): ${err?.message||err}`,'err'); alert('Errore nel parsing del CSV.'); }
    finally{input.value='';}
  }

    const el=document.getElementById('uploadGrid');
    el.innerHTML=DATASETS.map((d,i)=>{ const n=ST[d.key]?.length||0; const inputId=`file_${d.key}_${i}`;
      return `<div class="upload-card"><input class="hid-file" id="${inputId}" type="file" accept=".csv,text/csv" data-target="${d.key}"><div class="upload-lbl">${escapeHtml(d.label)}</div><div class="upload-meta">${n?`<span class="loaded">${n} righe caricate</span>`:'Nessun file caricato'}<small>${escapeHtml(d.hint)}</small></div><div class="upload-actions"><button type="button" class="pick-btn" data-pick="${inputId}">Seleziona CSV</button>${n?`<button type="button" class="clear-btn" data-clear="${d.key}">Reset</button>`:''}</div></div>`;
    }).join('');
    document.querySelectorAll('input[type="file"][data-target]').forEach(inp=>{inp.onchange=()=>handleUploadInput(inp);});
  }

  // ==================== RENDER PRINCIPALE ====================
  function render(){
    document.querySelectorAll('.mtab').forEach(b=>b.classList.toggle('active',b.dataset.m===ST.market));
    const totals=DATASETS.reduce((s,d)=>s+(ST[d.key]?.length||0),0);
    document.getElementById('hdrInfo').textContent=`Dataset caricati: ${totals} righe`;
    updateBacktestDisplay();
    renderUploadGrid();
    if (ST.market==='dashboard') renderDashboard();
    else if (ST.market==='storico') renderStorico();
  }

  function bindStatic(){
    document.getElementById('mtabs').addEventListener('click',e=>{const b=e.target.closest('.mtab'); if(!b)return; ST.market=b.dataset.m; ST.q=''; render();});
    document.addEventListener('keydown',e=>{if(e.key==='Escape'&&ST.det)closeDetail();});
    document.getElementById('datasetToggle').addEventListener('click',()=>{const panel=document.getElementById('datasetPanel'),arrow=document.getElementById('toggleArrow'); panel.classList.toggle('open'); arrow.textContent=panel.classList.contains('open')?'▲':'▼';});
    document.body.addEventListener('click',e=>{
      const pick=e.target.closest('[data-pick]'); if(pick){document.getElementById(pick.dataset.pick).click(); return;}
      const clear=e.target.closest('[data-clear]'); if(clear){clearDatasetState(clear.dataset.clear); ST[clear.dataset.clear]=[]; render(); return;}
      const hs=e.target.closest('[data-hset]'); if(hs){setHistoryStatus(hs.dataset.hset,hs.dataset.val); return;}
      const hd=e.target.closest('[data-hdel]'); if(hd){removeHistoryItem(hd.dataset.hdel); return;}
      const hst=e.target.closest('[data-hstatus]'); if(hst){ST.histStatus=hst.dataset.hstatus; render(); return;}
      const sort=e.target.closest('[data-sort]'); if(sort){ST.sortMode=sort.dataset.sort; render(); return;}
      if(e.target.id==='histClearResolved'){clearHistoryResolved(); return;}
      if(e.target.id==='histClearAllBtn'){clearAllHistory(); return;}
      if(e.target.id==='histExportBtn'){exportHistory(); return;}
    });
    document.body.addEventListener('change',e=>{if(e.target.id==='histCatSel'){ST.histCategory=e.target.value; render();}});
    document.body.addEventListener('input',e=>{if(e.target.id==='searchIn'){ST.q=e.target.value.trim(); render();}});
  }

  function initApp(){ restoreDatasets(); bindStatic(); render(); }
  initApp();
})();
</script>
</body>
</html>

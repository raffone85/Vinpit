<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0b0d12">
  <title>Match Analyzer – Single View Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:#0b0e14; color:#eef2fb; font-family:'Inter',sans-serif;
      padding:16px; min-height:100vh; display:flex; justify-content:center;
    }
    .app-container{ max-width:1400px; width:100%; display:flex; flex-direction:column; gap:20px; }
    .header{ display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
    h1{ font-size:1.8rem; font-weight:700; letter-spacing:-0.02em; }
    h1 span{ color:#3b82f6; }
    .dataset-badge{ background:#1e2430; padding:6px 14px; border-radius:40px; font-size:0.9rem; color:#9ab3d0; }
    .controls{ display:flex; flex-wrap:wrap; gap:12px; align-items:center; background:#131a24; padding:12px 18px; border-radius:16px; }
    .control-group{ display:flex; gap:8px; align-items:center; }
    select, input[type="text"]{
      background:#0f151c; border:1px solid #2a3645; color:#fff; padding:8px 14px; border-radius:10px;
      font-size:0.9rem; outline:none; transition:0.15s;
    }
    select:focus, input:focus{ border-color:#3b82f6; }
    .checkbox-group{ display:flex; gap:16px; margin-left:8px; }
    .checkbox-group label{ display:flex; align-items:center; gap:6px; font-size:0.9rem; color:#b0c7e0; cursor:pointer; }
    .btn{
      background:#1e2a3a; border:none; color:#e0edff; padding:8px 16px; border-radius:10px;
      font-weight:500; font-size:0.9rem; cursor:pointer; transition:0.15s; border:1px solid #2e405b;
    }
    .btn-primary{ background:#3b82f6; border-color:#3b82f6; color:#fff; }
    .btn-primary:hover{ background:#2563eb; }
    .btn:hover{ background:#2a3a4e; }
    .main-layout{ display:flex; gap:20px; }
    .table-wrapper{ flex:3; min-width:0; background:#10171f; border-radius:20px; padding:16px; border:1px solid #253141; }
    .detail-panel{ flex:1.2; background:#10171f; border-radius:20px; padding:18px; border:1px solid #253141; max-height:80vh; overflow-y:auto; }
    @media (max-width:800px){ .main-layout{ flex-direction:column; } }
    .match-table{ width:100%; border-collapse:collapse; font-size:0.9rem; }
    .match-table th{ text-align:left; padding:12px 8px; color:#8da3c0; font-weight:500; border-bottom:1px solid #253141; }
    .match-table td{ padding:12px 8px; border-bottom:1px solid #1a2532; }
    .match-table tbody tr{ cursor:pointer; transition:background 0.1s; }
    .match-table tbody tr:hover{ background:#19232e; }
    .match-table tbody tr.selected{ background:#1e3a5f; border-left:3px solid #3b82f6; }
    .score-bar{ width:80px; height:6px; background:#1e2a3a; border-radius:4px; overflow:hidden; display:inline-block; margin-right:6px; }
    .score-fill{ height:100%; background:#3b82f6; border-radius:4px; }
    .aff-dots{ display:flex; gap:3px; }
    .dot{ width:8px; height:8px; border-radius:50%; background:#2e405b; }
    .dot.filled{ background:#10b981; }
    .badge{ display:inline-block; background:#1e3a5f; color:#a0c4ff; padding:2px 8px; border-radius:12px; font-size:0.7rem; font-weight:600; margin-right:4px; }
    .detail-title{ font-size:1.3rem; font-weight:600; margin-bottom:16px; }
    .detail-section{ margin-bottom:20px; }
    .detail-label{ font-size:0.75rem; text-transform:uppercase; letter-spacing:0.5px; color:#7f9bc0; margin-bottom:6px; }
    .detail-value{ font-size:1.1rem; font-weight:500; }
    .breakdown-item{ display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #1e2a3a; }
    .upload-area{ margin-top:12px; display:flex; flex-wrap:wrap; gap:8px; }
    .file-label{ background:#1e2a3a; padding:6px 14px; border-radius:10px; font-size:0.8rem; cursor:pointer; }
    .note{ color:#7f9bc0; font-size:0.8rem; margin-top:4px; }
    .bk{ margin-top:14px; padding-top:14px; border-top:1px solid #253141; }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <h1>Match <span>Analyzer</span> · Single View</h1>
    <div class="dataset-badge" id="datasetSummary">0 dataset caricati</div>
  </div>

  <details style="background:#10171f; border-radius:16px; padding:12px 18px;">
    <summary style="font-weight:600; cursor:pointer; color:#b0c7e0;">📂 Gestione Dataset (carica CSV)</summary>
    <div class="upload-area" id="uploadArea"></div>
  </details>

  <div class="controls">
    <div class="control-group">
      <label style="color:#8da3c0;">Mercato</label>
      <select id="marketSelect">
        <option value="ov05">Ov 0.5 PT</option>
        <option value="gg">GG</option>
        <option value="o25" selected>Ov 2.5</option>
        <option value="u25">U 2.5</option>
        <option value="mg13c">MG 1-3 Casa</option>
        <option value="mg13o">MG 1-3 Ospite</option>
        <option value="ia">Stats IA</option>
        <option value="players_cards">Giocatori Cartellini</option>
        <option value="players_shots">Giocatori Tiri/Gol</option>
        <option value="quote">1X2 Value</option>
        <option value="gz">GZ Index</option>
      </select>
    </div>
    <div class="control-group">
      <label style="color:#8da3c0;">Aff min</label>
      <select id="minAffSelect">
        <option value="1">1+</option><option value="2">2+</option><option value="3" selected>3+</option><option value="4">4+</option><option value="5">5</option>
      </select>
    </div>
    <div class="control-group">
      <input type="text" id="searchInput" placeholder="🔍 Cerca partita..." style="min-width:180px;">
    </div>
    <div class="checkbox-group">
      <label><input type="checkbox" id="filterGZ" checked> GZ</label>
      <label><input type="checkbox" id="filter1X2" checked> 1X2</label>
      <label><input type="checkbox" id="filterDM" checked> DM</label>
    </div>
    <div class="control-group">
      <button class="btn" id="exportCsvBtn">📄 CSV</button>
      <button class="btn" id="exportPdfBtn">📑 PDF</button>
      <button class="btn btn-primary" id="addToHistoryBtn">➕ Aggiungi a storico</button>
    </div>
  </div>

  <div class="main-layout">
    <div class="table-wrapper">
      <div style="overflow-x:auto;">
        <table class="match-table" id="matchTable">
          <thead>
            <tr><th>Ora</th><th>Partita</th><th>Score (0-100)</th><th>Affidabilità</th><th>Conferme</th></tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div id="noResultsMsg" style="text-align:center; padding:40px; color:#7f9bc0; display:none;">Nessun risultato con i filtri attuali.</div>
    </div>
    <div class="detail-panel" id="detailPanel">
      <div style="color:#8da3c0; text-align:center; padding:20px;">Seleziona una partita per vedere i dettagli</div>
    </div>
  </div>
</div>

<script>
(function(){
  // ==================== STATO GLOBALE ====================

  // ==================== HELPER (identici alle versioni precedenti) ====================

  function normName(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,' ').replace(/\s+/g,' ').trim();}

  function affBadge(aff){return `<div style="display:flex;align-items:center;gap:6px;"><div style="display:flex;gap:3px;">${dots(aff)}</div><span style="font-weight:600;">${aff}/5</span></div>`;}
  function fmt(n,d=2){if(n===null||n===undefined||Number.isNaN(n))return 'N/D';return Number(n).toFixed(d);}

  // ==================== PARSING (COMPLETO, IDENTICO ALL'ORIGINALE) ====================
  function parseOv05(t){const L=parseCsvLines(t);if(L.length<2)return[];const sep=L[0].includes(';')?';':',';const s=x=>(x||'').replace(/^"|"$/g,'').trim();const h=splitCsvLine(L[0],sep).map(s);const hi={};h.forEach((x,i)=>hi[x]=i);const g=(r,k)=>s(r[hi[k]]||'');const pf=x=>parseFloat((x||'0').replace(',','.').replace('%',''))||0;const pu=x=>{if(!x)return[0,0];const p=x.split('|').map(v=>parseInt(v)||0);return[p[0]||0,p[1]||0]};const R=[];for(let i=1;i<L.length;i++){const f=splitCsvLine(L[i],sep).map(s);if(f.length<5)continue;R.push({ora:g(f,'ORA'),evento:g(f,'EVENTO'),rpt:g(f,'Rpt'),ind:parseInt(g(f,'IND'))||999,qrOv05:pf(g(f,'QROv0.5pt')),delta:pf(g(f,'Delta')),u5:pu(g(f,'U5[C|O]')),u5ct:pu(g(f,'U5CT[C|O]')),diff:pf(g(f,'Diff')),mge:pf(g(f,'MGE')),cov05:pf(g(f,'COv0.5%')),oov05:pf(g(f,'OOv0.5%')),qrGG:pf(g(f,'QrGG')),qrO25:pf(g(f,'QrO25')),u5Raw:g(f,'U5[C|O]'),u5ctRaw:g(f,'U5CT[C|O]'),cov05R:g(f,'COv0.5%'),oov05R:g(f,'OOv0.5%')});}return R;}

  function parseIA(t){const L=parseCsvLines(t);if(L.length<2)return[];const sep=L[0].includes(',')?',':';';const s=x=>(x||'').replace(/^"|"$/g,'').trim();const h=splitCsvLine(L[0],sep).map(s);const hi={};h.forEach((x,i)=>hi[x]=i);const g=(r,k)=>s(r[hi[k]]||'');const pf=x=>parseFloat((x||'').replace(',','.'))||0;const R=[];for(let i=1;i<L.length;i++){const f=splitCsvLine(L[i],sep).map(s);if(f.length<5)continue;let oR=g(f,'DATA EV.');const tm=oR.match(/(\d{1,2}:\d{2})/),dt=oR.match(/(\d{2}-\d{2})/);const ora=(dt?dt[1].replace('-','/')+' ':'')+(tm?tm[1]:'');const r={ora:ora.trim(),nazione:g(f,'NAZIONE'),lega:g(f,'LEGA'),evento:g(f,'EVENTO'),rpt:g(f,'RIS.'),stats:[]};const cats=[['TT','Tiri Totali',g(f,'TT1X2'),pf(g(f,'TTaff'))],['TIP','Tiri in Porta',g(f,'TIP1X2'),pf(g(f,'TIPaff'))],['COR','Corner',g(f,'Cor1X2'),pf(g(f,'CorAff'))],['FAL','Falli',g(f,'Fal1X2'),pf(g(f,'FalAff'))],['FG','Fuorigioco',g(f,'FG1X2'),pf(g(f,'FGaff'))]];cats.forEach(([k,label,pred,aff])=>{if(pred)r.stats.push({key:k,label,pred,aff});});r.highCount=r.stats.filter(s=>s.aff>=2.5).length;r.maxAff=r.stats.length?Math.max(...r.stats.map(s=>s.aff)):0;r.avgAff=r.stats.length?r.stats.reduce((s,x)=>s+x.aff,0)/r.stats.length:0;R.push(r);}return R;}
  function parsePlCards(t){const L=parseCsvLines(t);if(L.length<2)return[];const sep=L[0].includes(';')?';':',';const s=x=>(x||'').replace(/^"|"$/g,'').trim();const h=splitCsvLine(L[0],sep).map(s);const hi={};h.forEach((x,i)=>hi[x]=i);const g=(r,k)=>s(r[hi[k]]||'');const pf=x=>parseFloat((x||'0').replace(',','.'))||0;const R=[];for(let i=1;i<L.length;i++){const f=splitCsvLine(L[i],sep).map(s);if(f.length<5)continue;const oR=g(f,'Ora');const tm=oR.match(/(\d{1,2}:\d{2})/),dt=oR.match(/(\d{2}-\d{2})/);const ora=(dt?dt[1].replace('-','/')+' ':'')+(tm?tm[1]:'');R.push({ora:ora.trim(),lega:g(f,'Campionato'),partita:g(f,'Partita'),nome:g(f,'Nome'),squadra:g(f,'Squadra'),pos:g(f,'Pos.'),pres:parseInt(pf(g(f,'Presenze'))),min:pf(g(f,'Minuti')),tackle:pf(g(f,'Tackel')),falli:pf(g(f,'Falli')),amm:pf(g(f,'Ammonizioni')),esp:pf(g(f,'Esplusioni')),rit:parseInt(g(f,'Rit.'))||0});}return R;}
  function parsePlShots(t){const L=parseCsvLines(t);if(L.length<2)return[];const sep=L[0].includes(';')?';':',';const s=x=>(x||'').replace(/^"|"$/g,'').trim();const h=splitCsvLine(L[0],sep).map(s);const hi={};h.forEach((x,i)=>hi[x]=i);const g=(r,k)=>s(r[hi[k]]||'');const pf=x=>parseFloat((x||'0').replace(',','.'))||0;const R=[];for(let i=1;i<L.length;i++){const f=splitCsvLine(L[i],sep).map(s);if(f.length<5)continue;const oR=g(f,'Ora');const tm=oR.match(/(\d{1,2}:\d{2})/),dt=oR.match(/(\d{2}-\d{2})/);const ora=(dt?dt[1].replace('-','/')+' ':'')+(tm?tm[1]:'');R.push({ora:ora.trim(),lega:g(f,'Campionato'),partita:g(f,'Partita'),nome:g(f,'Nome'),squadra:g(f,'Squadra'),pos:g(f,'Pos.'),pres:parseInt(pf(g(f,'Presenze'))),min:pf(g(f,'Minuti')),tiriTot:pf(g(f,'Tiri Totali')),tiriPorta:pf(g(f,'Tiri in porta')),gol:pf(g(f,'Gol')),rit:parseInt(g(f,'Rit.'))||0});}return R;}

  function mg13AFF_C(r){const b=[];if(r.ich<=300)b.push({n:'ICH <= 300',p:2.5});else if(r.ich<=320)b.push({n:'ICH 301-320',p:2});else if(r.ich<=350)b.push({n:'ICH 321-350',p:1.5});else if(r.ich<=400)b.push({n:'ICH 351-400',p:.5});else b.push({n:'ICH > 400',p:0});if(r.varc>=40)b.push({n:'VarC >= 40%',p:2});else if(r.varc>=30)b.push({n:'VarC 30-39%',p:1.5});else if(r.varc>=20)b.push({n:'VarC 20-29%',p:.5});else b.push({n:'VarC < 20%',p:0});if(r.mgfc>=1.5&&r.mgfc<=2.5)b.push({n:'MGFC 1.5-2.5',p:1.5});else if(r.mgfc>=1&&r.mgfc<1.5)b.push({n:'MGFC 1.0-1.49',p:1});else if(r.mgfc>2.5&&r.mgfc<=3)b.push({n:'MGFC 2.51-3.0',p:.75});else b.push({n:'MGFC fuori range',p:0});if(r.vu5c>=60)b.push({n:'VU5C >= 60%',p:1});else if(r.vu5c>=40)b.push({n:'VU5C 40-59%',p:.5});else b.push({n:'VU5C < 40%',p:0});if(r.q1>=1.5&&r.q1<=2.5)b.push({n:'Q1 1.50-2.50',p:1});else if((r.q1>=1.2&&r.q1<1.5)||(r.q1>2.5&&r.q1<=4))b.push({n:'Q1 ok',p:.5});else b.push({n:'Q1 estrema',p:0});if(r.mgso>=1.5)b.push({n:'MGSO >= 1.5',p:1});else if(r.mgso>=1)b.push({n:'MGSO 1.0-1.49',p:.5});else b.push({n:'MGSO < 1.0',p:0});if(r.ritc>=3)b.push({n:'RitC >= 3',p:.75});else if(r.ritc>=1)b.push({n:'RitC 1-2',p:.25});else b.push({n:'RitC 0',p:0});const tot=b.reduce((s,x)=>s+x.p,0);return{breakdown:b,total:tot,aff:tot>=8?5:tot>=6.5?4:tot>=5?3:tot>=3.5?2:1,max:9.75};}
  function mg13AFF_O(r){const b=[];if(r.ica<=300)b.push({n:'ICA <= 300',p:2.5});else if(r.ica<=320)b.push({n:'ICA 301-320',p:2});else if(r.ica<=350)b.push({n:'ICA 321-350',p:1.5});else if(r.ica<=400)b.push({n:'ICA 351-400',p:.5});else b.push({n:'ICA > 400',p:0});if(r.varo>=40)b.push({n:'VarO >= 40%',p:2});else if(r.varo>=30)b.push({n:'VarO 30-39%',p:1.5});else if(r.varo>=20)b.push({n:'VarO 20-29%',p:.5});else b.push({n:'VarO < 20%',p:0});if(r.mgfo>=1.5&&r.mgfo<=2.5)b.push({n:'MGFO 1.5-2.5',p:1.5});else if(r.mgfo>=1&&r.mgfo<1.5)b.push({n:'MGFO 1.0-1.49',p:1});else if(r.mgfo>2.5&&r.mgfo<=3)b.push({n:'MGFO 2.51-3.0',p:.75});else b.push({n:'MGFO fuori range',p:0});if(r.vu5o>=60)b.push({n:'VU5O >= 60%',p:1});else if(r.vu5o>=40)b.push({n:'VU5O 40-59%',p:.5});else b.push({n:'VU5O < 40%',p:0});if(r.q2>=2&&r.q2<=4)b.push({n:'Q2 2.00-4.00',p:1});else if(r.q2>4&&r.q2<=6)b.push({n:'Q2 4.01-6.00',p:.5});else b.push({n:'Q2 estrema',p:0});if(r.mgsc>=1.5)b.push({n:'MGSC >= 1.5',p:1});else if(r.mgsc>=1)b.push({n:'MGSC 1.0-1.49',p:.5});else b.push({n:'MGSC < 1.0',p:0});if(r.rito>=3)b.push({n:'RitO >= 3',p:.75});else if(r.rito>=1)b.push({n:'RitO 1-2',p:.25});else b.push({n:'RitO 0',p:0});const tot=b.reduce((s,x)=>s+x.p,0);return{breakdown:b,total:tot,aff:tot>=8?5:tot>=6.5?4:tot>=5?3:tot>=3.5?2:1,max:9.75};}
  function scoreAmm(r){const b=[];if(r.amm>=.4)b.push({n:'Amm/p >= 0.40',p:3});else if(r.amm>=.3)b.push({n:'Amm/p 0.30-0.39',p:2.5});else if(r.amm>=.2)b.push({n:'Amm/p 0.20-0.29',p:1.5});else b.push({n:'Amm/p < 0.20',p:0});if(r.falli>=2.5)b.push({n:'Falli >= 2.5',p:2.5});else if(r.falli>=2)b.push({n:'Falli 2.0-2.49',p:2});else if(r.falli>=1.5)b.push({n:'Falli 1.5-1.99',p:1});else b.push({n:'Falli < 1.5',p:0});if(r.rit>=5)b.push({n:'Ritardo >= 5',p:2});else if(r.rit>=3)b.push({n:'Ritardo 3-4',p:1.5});else if(r.rit>=1)b.push({n:'Ritardo 1-2',p:.5});else b.push({n:'Ritardo 0',p:0});if(r.tackle>=2)b.push({n:'Tackle >= 2.0',p:1.5});else if(r.tackle>=1)b.push({n:'Tackle 1.0-1.99',p:.75});else b.push({n:'Tackle < 1.0',p:0});if(r.min>=70)b.push({n:'Minuti >= 70',p:.5});else b.push({n:'Minuti < 70',p:0});const tot=b.reduce((s,x)=>s+x.p,0);return{breakdown:b,total:tot,max:9.5,level:tot>=7?'hot':tot>=5?'warm':'mild'};}
  function scoreGol(r){const b=[];if(r.gol>=.4)b.push({n:'Gol/p >= 0.40',p:3});else if(r.gol>=.25)b.push({n:'Gol/p 0.25-0.39',p:2});else if(r.gol>=.15)b.push({n:'Gol/p 0.15-0.24',p:1});else b.push({n:'Gol/p < 0.15',p:0});if(r.tiriPorta>=2)b.push({n:'TiP >= 2.0',p:2.5});else if(r.tiriPorta>=1.5)b.push({n:'TiP 1.5-1.99',p:1.5});else if(r.tiriPorta>=1)b.push({n:'TiP 1.0-1.49',p:1});else b.push({n:'TiP < 1.0',p:0});if(r.rit>=5)b.push({n:'Ritardo >= 5',p:2});else if(r.rit>=3)b.push({n:'Ritardo 3-4',p:1.5});else if(r.rit>=1)b.push({n:'Ritardo 1-2',p:.5});else b.push({n:'Ritardo 0',p:0});if(r.tiriTot>=3)b.push({n:'TT >= 3.0',p:1.5});else if(r.tiriTot>=2)b.push({n:'TT 2.0-2.99',p:1});else b.push({n:'TT < 2.0',p:0});if(r.min>=70)b.push({n:'Minuti >= 70',p:.5});else b.push({n:'Minuti < 70',p:0});const tot=b.reduce((s,x)=>s+x.p,0);return{breakdown:b,total:tot,max:9.5,level:tot>=7?'hot':tot>=5?'warm':'mild'};}

  // ==================== GETTERS PER MERCATO (ADATTATI) ====================
  function getOv05Rows(){
    let rows = ST.ov05.length ? ST.ov05.map(r => { const a = ov05AFF(r); const gz = getGzAlignment(r.evento, 'over'); const qv = getQuoteAlignment(r.evento); const dm = getDataMiningForMatch(r.evento); const dmFactor = getDMFactor(dm, 'ov05'); const combinedScore = a.total * dmFactor; const combinedAff = Math.min(5, Math.round(a.aff * dmFactor)); return { ...r, score: combinedScore, aff: combinedAff, originalScore: a.total, originalAff: a.aff, breakdown: a.breakdown, marketLabel: 'Ov 0.5PT', m1: ov05M1(r), gzAlign: gz, qvAlign: qv, dm }; }) : [];
    return rows.sort((a,b)=>b.score-a.score||sortTime(a,b));
  }
  function getGgRows(){
    let rows = ST.ggov25.length ? ST.ggov25.map(r => { const a = ggAFF(r); const gz = getGzAlignment(r.evento, 'over'); const qv = getQuoteAlignment(r.evento); const dm = getDataMiningForMatch(r.evento); const dmFactor = getDMFactor(dm, 'gg'); const combinedScore = a.total * dmFactor; const combinedAff = Math.min(5, Math.round(a.aff * dmFactor)); return { ...r, score: combinedScore, aff: combinedAff, originalScore: a.total, originalAff: a.aff, breakdown: a.breakdown, marketLabel: 'GG', m1: ggM1(r), gzAlign: gz, qvAlign: qv, dm }; }) : [];
    return rows.sort((a,b)=>b.score-a.score||sortTime(a,b));
  }
  function getO25Rows(){
    let rows = ST.ggov25.length ? ST.ggov25.map(r => { const a = o25AFF(r); const gz = getGzAlignment(r.evento, 'over'); const qv = getQuoteAlignment(r.evento); const dm = getDataMiningForMatch(r.evento); const dmFactor = getDMFactor(dm, 'o25'); const combinedScore = a.total * dmFactor; const combinedAff = Math.min(5, Math.round(a.aff * dmFactor)); return { ...r, score: combinedScore, aff: combinedAff, originalScore: a.total, originalAff: a.aff, breakdown: a.breakdown, marketLabel: 'Ov 2.5', m1: o25M1(r), gzAlign: gz, qvAlign: qv, dm }; }) : [];
    return rows.sort((a,b)=>b.score-a.score||sortTime(a,b));

  function getU25Rows(){
    let rows = ST.ggov25.length ? ST.ggov25.map(r => { const a = u25AFF(r); const gz = getGzAlignment(r.evento, 'under'); const qv = getQuoteAlignment(r.evento); const dm = getDataMiningForMatch(r.evento); const dmFactor = getDMFactor(dm, 'u25'); const combinedScore = a.total * dmFactor; const combinedAff = Math.min(5, Math.round(a.aff * dmFactor)); return { ...r, score: combinedScore, aff: combinedAff, originalScore: a.total, originalAff: a.aff, breakdown: a.breakdown, marketLabel: 'U 2.5', m1: u25M1(r), gzAlign: gz, qvAlign: qv, dm }; }) : [];
    return rows.sort((a,b)=>b.score-a.score||sortTime(a,b));
  }
  function getMgRows(side){
    let rows = ST.mg13.length ? ST.mg13.map(r => { const house = mg13AFF_C(r), away = mg13AFF_O(r); const aff = side==='ospite'?away.aff:house.aff; const dm = getDataMiningForMatch(r.evento); const dmFactor = getDMFactor(dm, 'mg13'); const combinedScore = Math.max(house.total, away.total) * dmFactor; const combinedAff = Math.min(5, Math.round(aff * dmFactor)); return { ...r, score: combinedScore, aff: combinedAff, originalScore: Math.max(house.total, away.total), originalAff: aff, house, away, breakdown: side==='ospite'?away.breakdown:house.breakdown, side, m1c: mg13M1C(r), m1o: mg13M1O(r), dm }; }) : [];
    return rows.sort((a,b)=>b.score-a.score||sortTime(a,b));
  }
  function getIaRows(){
    let rows = ST.ia.map(r => ({...r, score: r.avgAff, aff: r.maxAff>=4?5:r.maxAff>=3?4:r.maxAff>=2.5?3:r.maxAff>=1.5?2:1}));
    return rows.sort((a,b)=>b.score-a.score||sortTime(a,b));
  }
  function getPlayerRows(type){
    const isCards = type==='cards';
    let rows = (isCards?ST.plCards:ST.plShots).map(r => { const a = isCards?scoreAmm(r):scoreGol(r); return {...r, score:a.total, level:a.level, breakdown:a.breakdown, aff:a.total>=7?5:a.total>=5?4:a.total>=3.5?3:a.total>=2?2:1, marketLabel:isCards?'Cartellini':'Gol/Tiri'}; });
    return rows.sort((a,b)=>b.score-a.score||sortTime(a,b));
  }
  function getQuoteRows(){
    let rows = ST.quoteValore.map(r => { const a = analyzeQuoteMatch(r); return {...r, score:a.score, ...a}; });
    return rows.sort((a,b)=>b.score-a.score||sortTime(a,b));
  }
  function getGzRows(){
    let rows = ST.gz.map(r => ({...r, prob:gzProbability(r.gz), score:Math.abs(r.gz||0)}));
    return rows.sort((a,b)=>Math.abs(b.gz||0)-Math.abs(a.gz||0)||sortTime(a,b));
  }

  // ==================== CALCOLO RISULTATI PER MERCATO (CON CACHING) ====================
  function computeResultsForMarket(market) {
    let rows = [];
    switch(market) {
      case 'ov05': rows = getOv05Rows(); break;
      case 'gg': rows = getGgRows(); break;
      case 'o25': rows = getO25Rows(); break;
      case 'u25': rows = getU25Rows(); break;
      case 'mg13c': rows = getMgRows('casa'); break;
      case 'mg13o': rows = getMgRows('ospite'); break;
      case 'ia': rows = getIaRows(); break;
      case 'players_cards': rows = getPlayerRows('cards'); break;
      case 'players_shots': rows = getPlayerRows('shots'); break;
      case 'quote': rows = getQuoteRows(); break;
      case 'gz': rows = getGzRows(); break;
      default: rows = [];
    }
    const maxScore = Math.max(...rows.map(r=>r.score||0), 1);
    rows = rows.map(r => ({...r, normScore: ((r.score||0) / maxScore) * 100}));
    return rows;
  }

  function getFilteredResults() {
    const cacheKey = `${ST.currentMarket}_${JSON.stringify(ST.filters)}`;
    if (ST.cache.has(cacheKey)) return ST.cache.get(cacheKey);
    let rows = computeResultsForMarket(ST.currentMarket);
    rows = rows.filter(r => {
      if ((r.aff||0) < ST.filters.minAff) return false;
      if (ST.filters.search) {
        const hay = (r.evento||r.match||r.nome||'').toLowerCase();
        if (!hay.includes(ST.filters.search.toLowerCase())) return false;
      }
      if (ST.filters.requireGZ && !r.gzAlign?.aligned) return false;
      if (ST.filters.require1X2 && !(r.qvAlign && marketSupportsQuote(ST.currentMarket, r.qvAlign))) return false;
      if (ST.filters.requireDM && !r.dm) return false;
      return true;
    });
    ST.cache.set(cacheKey, rows);
    return rows;
  }

  // ==================== RENDERING ====================
  function renderTable() {
    const rows = getFilteredResults();
    const tbody = document.getElementById('tableBody');
    const noMsg = document.getElementById('noResultsMsg');
    if (rows.length === 0) {
      tbody.innerHTML = '';
      noMsg.style.display = 'block';
      return;
    }
    noMsg.style.display = 'none';
    let html = '';
    rows.forEach((r, idx) => {
      const name = r.evento || r.match || r.nome || '';
      const ora = r.ora || '';
      const aff = r.aff || 1;
      const normScore = r.normScore || 0;
      const badges = [];
      if (r.m1) badges.push('<span class="badge">M1</span>');
      if (r.gzAlign?.aligned) badges.push('<span class="badge">GZ</span>');
      if (r.qvAlign && marketSupportsQuote(ST.currentMarket, r.qvAlign)) badges.push('<span class="badge">1X2</span>');
      if (r.dm) badges.push(dmBadgeHtml(r.dm, ST.currentMarket) + valueBadgeHtml(r.dm, ST.currentMarket));
      const affDots = Array(5).fill(0).map((_,i)=>`<span class="dot ${i<aff?'filled':''}"></span>`).join('');
      html += `<tr data-index="${idx}" onclick="window.selectRow(${idx})">
        <td>${escapeHtml(ora)}</td>
        <td>${escapeHtml(name)}</td>
        <td>
          <div style="display:flex; align-items:center; gap:6px;">
            <span style="min-width:45px;">${Math.round(normScore)}</span>
            <div class="score-bar"><div class="score-fill" style="width:${normScore}%;"></div></div>
          </div>
        </td>
        <td><div class="aff-dots">${affDots}</div></td>
        <td>${badges.join(' ')}</td>
      </tr>`;
    });
    tbody.innerHTML = html;
    if (ST.selectedRow !== null) {
      const prevSelected = document.querySelector(`tr[data-index="${ST.selectedRow}"]`);
      if (prevSelected) prevSelected.classList.add('selected');
    }
  }

  window.selectRow = function(idx) {
    const rows = getFilteredResults();
    const row = rows[idx];
    if (!row) return;
    ST.selectedRow = idx;
    renderTable();
    renderDetail(row);
  };

  function renderDetail(row) {
    const panel = document.getElementById('detailPanel');
    let breakdownHtml = '';
    if (row.breakdown) {
      breakdownHtml = `<div class="bk"><div style="font-weight:600; margin-bottom:8px;">Breakdown punteggio</div>`;
      row.breakdown.forEach(x => { breakdownHtml += `<div class="breakdown-item"><span>${escapeHtml(x.n)}</span><span>+${fmt(x.p,2)}</span></div>`; });
      breakdownHtml += `<div class="breakdown-item" style="font-weight:700;"><span>Totale</span><span>${fmt(row.originalScore||row.score,2)}</span></div></div>`;
    }
    let dmHtml = '';
    if (row.dm) {
      dmHtml = `<div class="bk"><div style="font-weight:600; margin-bottom:8px;">📈 DataMining (NP: ${row.dm.np})</div>`;
      dmHtml += `<div>1: ${row.dm.p1.toFixed(0)}% / ${row.dm.q1.toFixed(2)} | X: ${row.dm.pX.toFixed(0)}% / ${row.dm.qX.toFixed(2)} | 2: ${row.dm.p2.toFixed(0)}% / ${row.dm.q2.toFixed(2)}</div>`;
      dmHtml += `<div>OV25: ${row.dm.pOV25.toFixed(0)}% / ${row.dm.qOV25.toFixed(2)} | UN35: ${row.dm.pUN35.toFixed(0)}% / ${row.dm.qUN35.toFixed(2)}</div>`;
      dmHtml += `</div>`;
    }
    panel.innerHTML = `
      <div class="detail-title">${escapeHtml(row.evento||row.match||row.nome)}</div>
      <div class="detail-section">
        <div class="detail-label">Score normalizzato</div>
        <div class="detail-value">${Math.round(row.normScore)}/100</div>
      </div>
      <div class="detail-section">
        <div class="detail-label">Affidabilità</div>
        ${affBadge(row.aff)}
      </div>

      ${breakdownHtml}
    `;
  }

  // ==================== UPLOAD E PERSISTENZA ====================
  const DATA_STORAGE_PREFIX='ma_dataset_';
  function datasetStorageKey(key){return `${DATA_STORAGE_PREFIX}${key}`;}
  function saveDatasetState(key){try{localStorage.setItem(datasetStorageKey(key),JSON.stringify(ST[key]||[]));}catch(e){}}
  function loadDatasetState(key){try{return JSON.parse(localStorage.getItem(datasetStorageKey(key))||'[]');}catch(e){return [];}}
  function clearDatasetState(key){try{localStorage.removeItem(datasetStorageKey(key));}catch(e){}}
  function restoreDatasets(){DATASETS.forEach(d=>{const rows=loadDatasetState(d.key); if(Array.isArray(rows)&&rows.length) ST[d.key]=rows;}); updateDatasetSummary();}
  function parseAndStore(key,text){
    const map={ov05:parseOv05,ggov25:parseGGOv25,mg13:parseMG13,ia:parseIA,plCards:parsePlCards,plShots:parsePlShots,quoteValore:parseQuoteValore,gz:parseGZ,dataMining:parseDataMining};
    if(!map[key])throw new Error('Dataset non gestito');
    const data=map[key](text); ST[key]=Array.isArray(data)?data:[];
    saveDatasetState(key);
    ST.cache.clear();
    updateDatasetSummary();
    renderTable();
  }
  async function handleUploadInput(input){
    const key=input?.dataset?.target; const file=input?.files?.[0];
    if(!key||!file)return;
    try{
      const raw=await file.text();
      if(!raw||!raw.trim()) throw new Error('File vuoto');
      parseAndStore(key,raw);
    }catch(err){ alert('Errore nel parsing del CSV.'); }
    finally{input.value='';}
  }
  function renderUploadArea(){
    const el=document.getElementById('uploadArea');
    el.innerHTML=DATASETS.map((d,i)=>{
      const n=ST[d.key]?.length||0; const inputId=`file_${d.key}_${i}`;
      return `<div style="background:#0f151c; padding:12px; border-radius:12px; min-width:180px;">
        <div style="font-weight:600;">${d.label}</div>
        <div style="font-size:0.8rem; color:#9ab3d0;">${n?`${n} righe`:'Nessun dato'}</div>

  function updateDatasetSummary(){

  // ==================== ESPORTAZIONE ====================
  function exportCsv(){
    const rows = getFilteredResults();
    if(!rows.length) return alert('Nessun dato da esportare.');
    const headers = ['Ora','Partita','Score','Aff','Conferme'];
    const csvRows = rows.map(r=>[r.ora||'', r.evento||r.match||r.nome||'', r.normScore.toFixed(0), r.aff||'', [r.m1?'M1':'', r.gzAlign?.aligned?'GZ':'', r.qvAlign?'1X2':'', r.dm?'DM':''].filter(Boolean).join(' ')]);
    const csvContent = [headers, ...csvRows].map(row=>row.map(cell=>`"${String(cell).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['\uFEFF'+csvContent], {type:'text/csv;charset=utf-8;'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'match_analyzer_export.csv'; a.click();
  }
  function exportPdf(){
    const rows = getFilteredResults();
    if(!rows.length) return alert('Nessun dato da esportare.');
    const jspdf = window.jspdf; if(!jspdf?.jsPDF) return alert('Libreria PDF non pronta.');
    const doc = new jspdf.jsPDF({orientation:'portrait',unit:'pt',format:'a4'});
    const title = `Match Analyzer - ${ST.currentMarket}`;
    const head = [['Ora','Partita','Score','Aff','Conferme']];
    const body = rows.map(r=>[r.ora||'', r.evento||r.match||r.nome||'', Math.round(r.normScore), r.aff||'', [r.m1?'M1':'', r.gzAlign?.aligned?'GZ':'', r.qvAlign?'1X2':'', r.dm?'DM':''].filter(Boolean).join(' ')]);
    doc.setFillColor(11,13,18); doc.rect(0,0,595,70,'F'); doc.setTextColor(255,255,255); doc.setFontSize(16); doc.text(title,40,34);
    doc.autoTable({startY:86,head,body,theme:'grid',styles:{fontSize:8},headStyles:{fillColor:[20,23,32]}});
    doc.save(`${title.replace(/\s+/g,'-').toLowerCase()}.pdf`);
  }

  // ==================== STORICO (SEMPLIFICATO) ====================
  function addSelectedToHistory(){
    const rows = getFilteredResults();
    const row = rows[ST.selectedRow];
    if(!row) return alert('Seleziona una partita.');
    const entry = {
      id: Date.now()+'_'+Math.random().toString(36),
      createdAt: new Date().toISOString(),
      match: row.evento||row.match||row.nome,
      market: ST.currentMarket,
      score: row.normScore,
      aff: row.aff,
      status: 'pending'
    };
    ST.history.push(entry);
    localStorage.setItem('ma_single_history', JSON.stringify(ST.history));
    alert('Aggiunto allo storico!');
  }

  // ==================== BINDING E INIZIO ====================
  function bindUI(){
    document.getElementById('marketSelect').addEventListener('change', e=>{ ST.currentMarket=e.target.value; ST.cache.clear(); renderTable(); if(ST.selectedRow!==null) { const rows=getFilteredResults(); if(rows[ST.selectedRow]) renderDetail(rows[ST.selectedRow]); else ST.selectedRow=null; } });
    document.getElementById('minAffSelect').addEventListener('change', e=>{ ST.filters.minAff=parseInt(e.target.value); ST.cache.clear(); renderTable(); });
    document.getElementById('searchInput').addEventListener('input', e=>{ ST.filters.search=e.target.value; ST.cache.clear(); renderTable(); });
    document.getElementById('filterGZ').addEventListener('change', e=>{ ST.filters.requireGZ=e.target.checked; ST.cache.clear(); renderTable(); });
    document.getElementById('filter1X2').addEventListener('change', e=>{ ST.filters.require1X2=e.target.checked; ST.cache.clear(); renderTable(); });
    document.getElementById('filterDM').addEventListener('change', e=>{ ST.filters.requireDM=e.target.checked; ST.cache.clear(); renderTable(); });
    document.getElementById('exportCsvBtn').addEventListener('click', exportCsv);
    document.getElementById('exportPdfBtn').addEventListener('click', exportPdf);
    document.getElementById('addToHistoryBtn').addEventListener('click', addSelectedToHistory);
  }

  function init(){
    restoreDatasets();
    renderUploadArea();
    bindUI();
    renderTable();
  }
  init();
})();
</script>
</body>
</html>

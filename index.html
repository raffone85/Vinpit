 return {
  on(ev, fn){ (subs[ev] = subs[ev] || []).push(fn); },

function startOfWeekISO(){
 const d = new Date();
 const dow = (d.getDay() + 6) % 7;
 d.setDate(d.getDate() - dow);
 d.setHours(0,0,0,0);
 return d.toISOString();
}

function clamp(v,mn,mx){return Math.max(mn, Math.min(mx, v));}
function round(v,d){if(d==null)d=2;const p=Math.pow(10,d);return Math.round(v*p)/p;}
function fmtEur(v){if(v==null||Number.isNaN(v))return 'EUR -';return 'EUR '+Number(v).toFixed(2).replace('.',',');}

function normMatchKey(s){
 if(!s) return '';
 return String(s).toLowerCase()
  .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
  .replace(/\s+vs\s+|\s+v\s+/g,' - ')
  .replace(/\s+[-]\s+/g,' - ')
  .replace(/[^a-z0-9\- ]/g,' ')
  .replace(/\s+/g,' ').trim();

function timeVal(ora){
 if(!ora) return 9999;
 const m = String(ora).match(/(\d{1,2}):(\d{2})/);
 if(!m) return 9999;
 return parseInt(m[1])*60 + parseInt(m[2]);
}

function cleanTime(ora){
 if(!ora) return '';
 const m = String(ora).match(/(\d{1,2}:\d{2})/);
 return m ? m[1] : String(ora);
}

function parseItalianNumber(s){
 if(s==null) return null;
 let t = String(s).trim().replace(/^"|"$/g,'');
 if(t==='' || t==='-' || t==='N/D' || t==='ND') return null;
 t = t.replace('%','').replace(/\s/g,'');
 if(t.indexOf('.')>=0 && t.indexOf(',')>=0) t = t.replace(/\./g,'').replace(',','.');
 else if(t.indexOf(',')>=0 && t.indexOf('.')<0) t = t.replace(',','.');
 const n = parseFloat(t);
 return isNaN(n) ? null : n;
}

function pfOr0(s){ const n = parseItalianNumber(s); return n==null ? 0 : n; }
function piOr0(s){ const n = parseItalianNumber(s); return n==null ? 0 : Math.round(n); }

function stdW(vals, weights){
 const W = weights.reduce((s,x)=>s+x,0);
 if(W<=0) return 0;
 const m = vals.reduce((s,x,i)=>s+x*weights[i],0)/W;
 const v = vals.reduce((s,x,i)=>s+weights[i]*(x-m)*(x-m),0)/W;
 return Math.sqrt(v);
}

function showToast(msg, type){
 if(!type) type = '';
 const wrap = document.getElementById('toastWrap');
 if(!wrap) return;
 const t = document.createElement('div');
 t.className = 'toast ' + type;
 t.textContent = msg;
 wrap.appendChild(t);
 setTimeout(function(){ t.style.opacity='0'; t.style.transform='translate(-50%,10px)'; setTimeout(function(){t.remove();},220); }, 2600);
}

function setUploadStatus(msg, type){
 if(!type) type = '';
 const el = document.getElementById('upStatus');
 if(!el) return;
 if(!msg){ el.style.display='none'; return; }
 el.style.display = 'block';
 el.className = 'up-status ' + type;
 el.innerHTML = msg;
}

/* =================== CSV PARSER =================== */
function detectDelimiter(firstLine){
 const candidates = [';',',','\t','|'];
 let best = ',', bestCount = 0;
 for(const d of candidates){
  let c = 0, inQ = false;
  for(let i=0;i<firstLine.length;i++){
   const ch = firstLine[i];
   if(ch === '"') inQ = !inQ;
   else if(ch === d && !inQ) c++;
  }
  if(c > bestCount){ bestCount = c; best = d; }
 }
 return best;
}

function splitCsvLine(line, sep){
 const out = [];
 let cur = '', inQ = false;
 for(let i=0;i<line.length;i++){
  const ch = line[i];
  if(ch === '"'){
   if(inQ && line[i+1]==='"'){ cur += '"'; i++; }
   else inQ = !inQ;
  } else if(ch === sep && !inQ){
   out.push(cur); cur='';
  } else cur += ch;
 }
 out.push(cur);
 return out.map(x => x.replace(/^"|"$/g,'').trim());
}

function parseCsvLines(text){
 return text.replace(/^\uFEFF/,'').replace(/\r\n?/g,'\n').trim().split('\n').filter(l=>l.trim()!=='');
}

function buildHeaderIndex(headerArr){
 const idx = {};
 headerArr.forEach((h,i) => { idx[h.trim()] = i; });
 return idx;
}

function gCell(row, idx, name){
 const i = idx[name];
 if(i === undefined) return '';
 return (row[i]==null) ? '' : String(row[i]).trim();
}

function parseOv05pt(text){
 const L = parseCsvLines(text); if(L.length<2) return [];
 const sep = detectDelimiter(L[0]);
 const hdr = splitCsvLine(L[0], sep);
 const ix = buildHeaderIndex(hdr);
 const rows = [];
 for(let i=1;i<L.length;i++){
  const f = splitCsvLine(L[i], sep);
  if(f.length < 3) continue;
  const evento = gCell(f,ix,'EVENTO');
  if(!evento) continue;
  const u5raw = gCell(f,ix,'U5[C|O]');
  const u5ctraw = gCell(f,ix,'U5CT[C|O]');
  const splitBar = function(v){ if(!v) return [0,0]; const p = v.split('|').map(x=>parseInt(x)||0); return [p[0]||0, p[1]||0]; };
  rows.push({
   ora: cleanTime(gCell(f,ix,'ORA')), evento,
   rpt: gCell(f,ix,'Rpt'),
   ind: piOr0(gCell(f,ix,'IND')) || 999,
   qrOv05: pfOr0(gCell(f,ix,'QROv0.5pt')) || pfOr0(gCell(f,ix,'QrOv0.5pt')),
   delta: pfOr0(gCell(f,ix,'Delta')),
   u5: splitBar(u5raw), u5ct: splitBar(u5ctraw),
   diff: pfOr0(gCell(f,ix,'Diff')),
   mge: pfOr0(gCell(f,ix,'MGE')),
   cov05: pfOr0(gCell(f,ix,'COv0.5%')),
   oov05: pfOr0(gCell(f,ix,'OOv0.5%')),
   qrGG: pfOr0(gCell(f,ix,'QrGG')),
   qrO25: pfOr0(gCell(f,ix,'QrO25')),
   _key: normMatchKey(evento)
  });
 }
 return rows;
}

function parseGGov25(text){

function parseIA(text){
 const L = parseCsvLines(text); if(L.length<2) return [];
 const sep = detectDelimiter(L[0]);
 const hdr = splitCsvLine(L[0], sep);
 const ix = buildHeaderIndex(hdr);
 const rows = [];
 for(let i=1;i<L.length;i++){
  const f = splitCsvLine(L[i], sep);
  if(f.length < 3) continue;
  let oraRaw = gCell(f,ix,'DATA EV.') || gCell(f,ix,'ORA');
  const tm = String(oraRaw).match(/(\d{1,2}:\d{2})/);
  const dt = String(oraRaw).match(/(\d{2}-\d{2})/);
  const ora = (dt ? dt[1].replace('-','/')+' ' : '') + (tm ? tm[1] : '');
  const evento = gCell(f,ix,'EVENTO');
  if(!evento) continue;
  const stats = [];
  const cats = [
   ['TT','Tiri Totali','TT1X2','TTaff'],
   ['TIP','Tiri in Porta','TIP1X2','TIPaff'],
   ['COR','Corner','Cor1X2','CorAff'],
   ['FAL','Falli','Fal1X2','FalAff'],
   ['FG','Fuorigioco','FG1X2','FGaff']
  ];
  cats.forEach(function(c){
   const k=c[0],lbl=c[1],kp=c[2],ka=c[3];
   const pred = gCell(f,ix,kp);
   const aff = pfOr0(gCell(f,ix,ka));
   if(pred) stats.push({key:k, label:lbl, pred, aff});
  });
  const affArr = stats.map(function(s){return s.aff;});
  const maxAff = affArr.length ? Math.max.apply(null, affArr) : 0;
  const avgAff = affArr.length ? affArr.reduce(function(s,x){return s+x;},0)/affArr.length : 0;
  rows.push({
   ora: ora.trim(), evento,
   nazione: gCell(f,ix,'NAZIONE'),
   lega: gCell(f,ix,'LEGA'),
   rpt: gCell(f,ix,'RIS.'),
   stats, maxAff, avgAff,
   highCount: stats.filter(function(s){return s.aff>=2.5;}).length,
   _key: normMatchKey(evento)
  });
 }
 return rows;
}

function parseQVal(text){

}

function parseDM(text){
 const L = parseCsvLines(text); if(L.length<2) return [];
 const sep = detectDelimiter(L[0]);
 const hdr = splitCsvLine(L[0], sep);
 // Trova tutte le occorrenze di un header. Prima = %, Seconda = quota.
 const findAll = function(name){
  const idxs = [];
  for(let i=0; i<hdr.length; i++){ if(hdr[i] === name) idxs.push(i); }
  return idxs;
 };
 // Coppia % + quota: cerca duplicati. Se trova solo 1, restituisce [-1,-1] (mancante).
 const findPair = function(name){
  const idxs = findAll(name);
  if(idxs.length >= 2) return [idxs[0], idxs[1]];
  return [-1, -1];
 };
 // Singola: il primo match.
 const findOne = function(name){
  const i = hdr.indexOf(name);
  return i;
 };
 const iOra = findOne('Ora'), iMatch = findOne('Match'), iR = findOne('R'), iRpt = findOne('Rpt'), iNP = findOne('NP');
 // 1X2: pattern "1, 1, X, X, 2, 2" (% + quota)
 const i1Pair = findPair('1');
 const iXPair = findPair('X');
 const i2Pair = findPair('2');
 const iMGE = findOne('MGE'), iDIFF = findOne('DIFF');
 // Mercati gol: tutti duplicati (% + quota)
 const iGGPair = findPair('GG');
 const iOV15Pair = findPair('OV15');
 const iOV25Pair = findPair('OV25');
 const iUN35Pair = findPair('UN35');
 const iOV05ptPair = findPair('OV0.5pt');
 // SC, SO: NON duplicati. Quota e' la colonna dopo IGBC/IGBO.
 const iIC = findOne('IC'), iRC = findOne('RC'), iRO = findOne('RO');
 const iSCP = findOne('SC'), iIGBC = findOne('IGBC');
 const iSCQ = iIGBC >= 0 ? iIGBC + 1 : -1;
 const iSOP = findOne('SO'), iIGBO = findOne('IGBO');
 const iSOQ = iIGBO >= 0 ? iIGBO + 1 : -1;
 const iRE = findOne('RE');
 const cell = (f, idx) => idx>=0 && idx<f.length ? f[idx] : '';
 const rows = [];
 for(let i=1;i<L.length;i++){
  const f = splitCsvLine(L[i], sep);
  if(f.length < 5) continue;
  const match = f[iMatch] ? f[iMatch].replace(/^"|"$/g,'').trim() : '';
  if(!match) continue;
  rows.push({
   ora: cleanTime(cell(f,iOra)), match, r: cell(f,iR), rpt: cell(f,iRpt), np: piOr0(cell(f,iNP)),
   p1: pfOr0(cell(f,i1Pair[0])), q1: pfOr0(cell(f,i1Pair[1])),
   pX: pfOr0(cell(f,iXPair[0])), qX: pfOr0(cell(f,iXPair[1])),
   p2: pfOr0(cell(f,i2Pair[0])), q2: pfOr0(cell(f,i2Pair[1])),
   mge: pfOr0(cell(f,iMGE)), diff: pfOr0(cell(f,iDIFF)),
   pGG: pfOr0(cell(f,iGGPair[0])), qGG: pfOr0(cell(f,iGGPair[1])),
   pOV15: pfOr0(cell(f,iOV15Pair[0])), qOV15: pfOr0(cell(f,iOV15Pair[1])),
   pOV25: pfOr0(cell(f,iOV25Pair[0])), qOV25: pfOr0(cell(f,iOV25Pair[1])),
   pUN35: pfOr0(cell(f,iUN35Pair[0])), qUN35: pfOr0(cell(f,iUN35Pair[1])),
   pOV05pt: pfOr0(cell(f,iOV05ptPair[0])), qOV05pt: pfOr0(cell(f,iOV05ptPair[1])),
   ic: piOr0(cell(f,iIC)), rc: piOr0(cell(f,iRC)), ro: piOr0(cell(f,iRO)),
   pSC: pfOr0(cell(f,iSCP)), qSC: pfOr0(cell(f,iSCQ)), igbc: piOr0(cell(f,iIGBC)),
   pSO: pfOr0(cell(f,iSOP)), qSO: pfOr0(cell(f,iSOQ)), igbo: piOr0(cell(f,iIGBO)),
   re: iRE>=0 ? (cell(f,iRE)) : '',
   _key: normMatchKey(match)
  });
 }
 return rows;
}

const PARSERS = {ov05pt:parseOv05pt, ggov25:parseGGov25, mg13:parseMG13, ia:parseIA, plCard:parsePlCard, plShot:parsePlShot, qVal:parseQVal, gz:parseGZ, dm:parseDM, diffg:parseDiffG};

function parseAndStore(key, text, fileName){
 const fn = PARSERS[key];
 if(!fn) throw new Error('Dataset non gestito: ' + key);
 const rows = fn(text);
 if(!Array.isArray(rows)) throw new Error('Parsing invalido');
 S.datasets[key] = rows;
 if(!S.datasetMeta) S.datasetMeta = {};
 S.datasetMeta[key] = {fileName: fileName || '', loadedAt: new Date().toISOString(), count: rows.length};
 bus.emit('csv:loaded', {key, count: rows.length});
}

function parseREField(reStr){
 if(!reStr) return [];
 const parts = reStr.split(/\s{2,}/).filter(function(s){return s.indexOf('%')>=0;});
 const items = parts.map(function(s){
  const mm = s.match(/(\d+\s*-\s*\d+)\s*:\s*([\d.,]+)/);
  if(!mm) return null;
  return {score: mm[1].replace(/\s/g,''), perc: parseItalianNumber(mm[2])};
 }).filter(function(x){return x && x.perc!=null;});
 return items.sort(function(a,b){return b.perc - a.perc;});
}

/* =================== LOOKUP =================== */
function buildLookups(){
 const L = {
  ov05pt: new Map(), ggov25: new Map(), mg13: new Map(), ia: new Map(),
  qVal: new Map(), gz: new Map(), dm: new Map(), diffg: new Map(),

 };

function buildUniverse(L){
 const map = new Map();
 const upsert = (key, info) => {
  if(!key) return;
  if(!map.has(key)) map.set(key, { _key:key, evento:info.evento||'', ora:info.ora||'', lega:info.lega||'', sources:[] });
  const cur = map.get(key);
  if(!cur.lega && info.lega) cur.lega = info.lega;
  if(!cur.ora && info.ora) cur.ora = info.ora;
  if(!cur.evento && info.evento) cur.evento = info.evento;
  if(info.source && cur.sources.indexOf(info.source)<0) cur.sources.push(info.source);
 };
 L.ggov25.forEach((r,k) => upsert(k,{evento:r.evento, ora:r.ora, lega:r.lega, source:'GG/Ov-Un'}));
 L.dm.forEach((r,k) => upsert(k,{evento:r.match, ora:r.ora, source:'DataMining'}));
 L.gz.forEach((r,k) => upsert(k,{evento:r.evento, ora:r.ora, lega:r.lega, source:'GZ'}));
 L.diffg.forEach((r,k) => upsert(k,{evento:r.evento, ora:r.ora, source:'Differenziali'}));
 L.ov05pt.forEach((r,k) => upsert(k,{evento:r.evento, ora:r.ora, source:'Ov 0.5 PT'}));
 L.mg13.forEach((r,k) => upsert(k,{evento:r.evento, ora:r.ora, source:'MG 1-3'}));
 L.ia.forEach((r,k) => upsert(k,{evento:r.evento, ora:r.ora, lega:r.lega, source:'Stats IA'}));
 L.qVal.forEach((r,k) => upsert(k,{evento:r.match, ora:r.ora, source:'Quote Valore'}));
 L.plCardByMatch.forEach((arr,k) => upsert(k,{evento:arr[0].partita, ora:arr[0].ora, lega:arr[0].lega, source:'Pl. Cartellini'}));
 L.plShotByMatch.forEach((arr,k) => upsert(k,{evento:arr[0].partita, ora:arr[0].ora, lega:arr[0].lega, source:'Pl. Tiri/Gol'}));
 return Array.from(map.values());
}

/* =================== NP PESATO A GRADINI =================== */
function npWeight(np){
 if(np==null) return 0;
 if(np>=100) return 1.0;
 if(np>=60) return 0.8;
 if(np>=30) return 0.5;
 if(np>=15) return 0.2;
 return 0;
}

/* =================== GZ MAP =================== */
function gzMap(gz){
 if(gz===null||gz===undefined) return null;
 if(gz < -1800) return {dir:'under', mkt:'U2.5', p:0.64, lbl:'U2.5 64%'};
 if(gz < -1200) return {dir:'under', mkt:'U3.5', p:0.81, lbl:'U3.5 81%'};
 if(gz > 5000)  return {dir:'over',  mkt:'O2.5', p:0.64, lbl:'Ov2.5 64%'};
 if(gz > 1000)  return {dir:'over',  mkt:'O1.5', p:0.80, lbl:'Ov1.5 80%'};
 if(gz > -200 && gz < 200) return {dir:'over', mkt:'O0.5', p:0.95, lbl:'Ov0.5 95%'};
 return {dir:'neutral', mkt:'-', p:0.5, lbl:'Neutrale'};
}

function operationalOdds(market, L, key){
 if(FIXED_ODDS[market]!==undefined) return FIXED_ODDS[market];
 const dm = L.dm.get(key);
 const dg = L.diffg.get(key);
 const ggov = L.ggov25.get(key);
 const ov = L.ov05pt.get(key);
 const qv = L.qVal.get(key);
 const firstValid = (...vals) => { for(const v of vals){ if(v && v>1.01) return v; } return null; };
 // Mercati Gol: SEMPRE prima fonte = DataMining Plus (seconda colonna duplicata)
 if(market==='Ov 0.5 PT') return firstValid(dm?dm.qOV05pt:null, ov?ov.qrOv05:null);
 if(market==='GG') return firstValid(dm?dm.qGG:null);
 if(market==='Ov 1.5') return firstValid(dm?dm.qOV15:null);

 if(market==='U 3.5') return firstValid(dm?dm.qUN35:null);
 if(market==='U 2.5') return firstValid(dg?dg.qrL:null, ggov?ggov.qov25:null); // U2.5 segnale derivato (no DM diretto)

 return null;

/* =================== KELLY =================== */
function kellyStake(p, odds, opts){
 opts = opts || {};
 const fraction = opts.fraction!==undefined ? opts.fraction : S.bankroll.kellyFraction;
 const cap = opts.cap!==undefined ? opts.cap : S.bankroll.capPct;
 const bankroll = opts.bankroll!==undefined ? opts.bankroll : S.bankroll.segregated;
 if(!odds || odds<=1.01) return {pct:0, eur:0, edge:0, fStar:0};
 const b = odds-1;
 const pImpl = 1/odds;
 const alpha = clamp(0.4+0.6*(opts.confidence||50)/100, 0.4, 1.0);
 const pShrunk = alpha*p+(1-alpha)*pImpl;
 const fStar = (b*pShrunk-(1-pShrunk))/b;
 if(fStar<=0) return {pct:0, eur:0, edge:pShrunk-pImpl, fStar:0, pShrunk};
 let pct = fraction*fStar;
 if(S.bankroll.afterLossActive) pct *= 0.75;
 pct = clamp(pct, 0, cap);
 const eur = round(pct*bankroll, 2);
 const edge = pShrunk-pImpl;
 return {pct, eur, edge, fStar, pShrunk};
}

const CONFLICT_PAIRS = new Set(['Ov 2.5|U 3.5','U 3.5|Ov 2.5','Ov 1.5|U 3.5','U 3.5|Ov 1.5','GG|U 3.5','U 3.5|GG','Ov 2.5|U 2.5','U 2.5|Ov 2.5','Ov 1.5|U 2.5','U 2.5|Ov 1.5','U 2.5|U 3.5','U 3.5|U 2.5','GG|U 2.5','U 2.5|GG','MG 2-4|Ov 2.5','Ov 2.5|MG 2-4','1|X','X|1','1|2','2|1','X|2','2|X']);
function pairKey(a,b){ return a+'|'+b; }
function sharesTeam(matchA, matchB){
 const sa = (matchA._key||'').split(' - ');
 const sb = (matchB._key||'').split(' - ');
 if(sa.length<2 || sb.length<2) return false;
 return sa[0]===sb[0]||sa[0]===sb[1]||sa[1]===sb[0]||sa[1]===sb[1];
}
function correlationScore(recA, recB){
 if(recA._key===recB._key){ if(CONFLICT_PAIRS.has(pairKey(recA.market, recB.market))) return 1.0; return 0.6; }
 let s = 0;
 if(recA.lega && recB.lega && recA.lega===recB.lega) s += 0.30;
 const tA = timeVal(recA.ora), tB = timeVal(recB.ora);
 if(Math.abs(tA-tB)<=30) s += 0.20;
 if(recA.market===recB.market) s += 0.15;
 if(sharesTeam(recA, recB)) s += 0.50;
 return Math.min(s, 0.99);
}

 s += (ev.boosts ? ev.boosts.length : 0) * 5;

 return Math.round(clamp(s, 85, 99));
}

    recs.push({
     _key:m._key, match:m.evento, ora:m.ora||'', lega:m.lega||'',
     market:evU25.market, dir:evU25.dir, odds, confidence:finalScore,
     fascia:'standard', topPick:false, blocks:[], boosts:evU25.reasons||[], conflicts:[], conditions:[], reasons:evU25.reasons,
     pModel, kelly, stake:kelly.eur, stakePct:kelly.pct*100, edge:kelly.edge*100,
     sig, level:'full', hasM1:false, coverage:0.7, components:[], capped:false, capReason:'',
     derived:true, derivedFrom:'U 3.5',
     narrative: m.evento + ' - U 2.5 a ' + odds.toFixed(2) + ' (score ' + finalScore + '). Pick DERIVATA: U 3.5 e\' gia\' solido (conf ' + refConf + '), e i dati supportano anche un esito Under piu\' stretto. Motivi: ' + (evU25.reasons||[]).join('; ') + '. Attenzione: piu\' rischiosa di U 3.5 perche\' richiede max 2 gol invece di 3.'
    });
    seenMarkets.add(evU25.market);
   }
  }
  // 3) MONITOR
  const mons = evalMonitor_Generic(L, m._key);
  for(const ev of mons){
   if(seenMarkets.has(ev.market)) continue;
   const odds = operationalOdds(ev.market, L, m._key);
   if(!odds || odds<1.01) continue;
   const finalScore = Math.round(ev.score);
   const pModel = clamp(finalScore/100*0.75+0.05, 0.05, 0.85);
   const kelly = kellyStake(pModel, odds, {confidence:finalScore});
   recs.push({
    _key:m._key, match:m.evento, ora:m.ora||'', lega:m.lega||'',
    market:ev.market, dir:ev.dir, side:ev.side, odds, confidence:finalScore,
    fascia:'monitor', topPick:false, blocks:[], boosts:ev.reasons||[], conflicts:[], conditions:[], reasons:ev.reasons,
    pModel, kelly, stake:0, stakePct:0, edge:kelly.edge*100,
    sig, level:'full', hasM1:false, coverage:0.4, components:[], capped:false, capReason:'',
    narrative: buildPickNarrative(m.evento, ev.market, finalScore, odds, 'monitor', null, ev.reasons, null, null)
   });
   seenMarkets.add(ev.market);
  }

  if(recs.length){
   recs.sort((a,b) => {
    const fOrd = {top:0, declassata:1, standard:2, monitor:3};
    const fa = fOrd[a.fascia]||9, fb = fOrd[b.fascia]||9;
    if(fa !== fb) return fa - fb;
    return b.confidence - a.confidence;
   });
   const hasTop = recs.some(r => r.topPick);
   const hasStd = recs.some(r => r.fascia==='standard');
   matches.push({match:m, sig, recs, top:recs[0], level:'full', hasTopPick:hasTop, hasStandard:hasStd});
  } else {
   // Match presente nei CSV ma nessun mercato attivabile (anche con monitor)
   const monitorRec = {
    _key:m._key, match:m.evento, ora:m.ora||'', lega:m.lega||'',
    market:'-', dir:null, side:null, odds:null, confidence:0, coverage:0,
    components:[], capped:false, capReason:'',
    pModel:0, kelly:{pct:0,eur:0,edge:0}, stake:0, stakePct:0, edge:0,
    sig, level:'monitor', hasM1:false, sources:m.sources||[], topPick:false, fascia:'empty',
    blocks:[], boosts:[], conflicts:[], conditions:[], reasons:[],
    narrative: 'Match presente in: '+(m.sources||[]).join(', ')+'. Nessun mercato attivabile con i dati attuali.'
   };
   matches.push({match:m, sig, recs:[monitorRec], top:monitorRec, level:'monitor', hasTopPick:false, hasStandard:false});
  }
 }
 matches.sort((a,b) => {
  if(a.hasTopPick && !b.hasTopPick) return -1;
  if(!a.hasTopPick && b.hasTopPick) return 1;
  if(a.hasStandard && !b.hasStandard) return -1;
  if(!a.hasStandard && b.hasStandard) return 1;
  if(a.level==='full' && b.level!=='full') return -1;
  if(a.level!=='full' && b.level==='full') return 1;
  return b.top.confidence-a.top.confidence;
 });
 return matches;
}

function buildPickNarrative(match, market, score, odds, fascia, conditions, boosts, conflicts, blocks){
 const oddsStr = odds ? odds.toFixed(2) : 'N/D';
 let txt = match+' - '+market+' a '+oddsStr+' (score '+score+'). ';
 if(fascia==='top'){
  txt += 'TOP PICK: regole rigide rispettate.';
  if(boosts && boosts.length) txt += ' Rinforzi: '+boosts.join('; ')+'.';
  if(conflicts && conflicts.length) txt += ' Conflitti minori: '+conflicts.join('; ')+'.';
 } else if(fascia==='declassata'){
  txt += 'Declassata: regole vere ma blocco attivo ('+(blocks||[]).join(', ')+').';
 } else if(fascia==='standard'){
  txt += 'Pick standard (segnali concordi). Motivi: '+(boosts||[]).join('; ');
 } else if(fascia==='monitor'){
  txt += 'Monitor: dati parziali, da approfondire. '+(boosts||[]).join('; ');
 }
 return txt;
}

function runDecisionEngine(){
 try {
  const allMatches = buildAllRecs();
  let topCount=0, stdCount=0, monCount=0, fullCount=0;
  for(const m of allMatches){
   if(m.level==='full') fullCount++;
   for(const r of m.recs){
    if(r.fascia==='top') topCount++;
    else if(r.fascia==='standard') stdCount++;
    else if(r.fascia==='monitor') monCount++;
   }
  }
  const emptyCount = allMatches.filter(m => m.level==='monitor').length;
  S.output = {computedAt:new Date().toISOString(), matchesCount:allMatches.length, fullCount, monCount:emptyCount, topCount, stdCount, monPickCount:monCount, allMatches};
  bus.emit('data:recomputed');
 } catch(e){
  console.error('Decision engine error', e);
  showToast('Errore nel calcolo: '+e.message, 'err');
 }
}

/* =================== GENERATORI (ora attingono da Top + Standard) =================== */
function flatRecsForBetting(allMatches){
 // Solo Top + Standard (no Monitor) per i generatori di schedine
 const out = [];
 for(const m of allMatches){
  if(m.level !== 'full') continue;
  for(const r of m.recs){
   if(r.fascia === 'top' || r.fascia === 'standard') out.push(r);
  }
 }
 return out;
}

function uniqueByMatch(recs){
 const dedup = {};
 recs.forEach(r => { if(!dedup[r._key] || dedup[r._key].confidence < r.confidence) dedup[r._key] = r; });
 return Object.values(dedup);
}

function genSingola(allMatches){
 const tries = [{confMin:65, edgeMin:0, label:'standard'}, {confMin:55, edgeMin:-2, label:'tolerante'}, {confMin:45, edgeMin:-5, label:'molto tolerante'}];
 for(const cfg of tries){
  const pool = []; const seen = new Set();
  for(const r of flatRecsForBetting(allMatches)){
   if(!r.odds || r.odds<1.50 || r.odds>1.80) continue;
   if(r.confidence<cfg.confMin) continue;
   if(r.edge<cfg.edgeMin) continue;
   if(seen.has(r._key)) continue;
   seen.add(r._key); pool.push(r);
  }
  if(pool.length>0){ pool.sort((a,b) => (b.confidence+b.edge*1.2)-(a.confidence+a.edge*1.2)); return {list: pool.slice(0,12), mode: cfg.label}; }
 }
 return {list:[], mode:'nessuna'};
}

/* Mercati "supplementari": MG 2-4 e' una copertura, 1/X/2 sono esiti secchi rischiosi.
   Vanno usati come riempimento, non come pick principali nelle schedine. */
const SUPPLEMENTARY_MARKETS = new Set(['MG 2-4', '1', 'X', '2']);
function isSupplementaryMarket(market){ return SUPPLEMENTARY_MARKETS.has(market); }
/* X (pareggio) e' il piu' rischioso di tutti: penalita' aggiuntiva */
function supplementaryWeight(market){
 if(market === 'X') return 12;       // pareggio = piu' rischioso
 if(market === '1' || market === '2') return 10;
 if(market === 'MG 2-4') return 8;
 return 0;
}

/* Helper: limita quante leg dello stesso mercato finiscono nella schedina (default max 2) */
function tooManyOfSameMarket(picked, candidate, maxSame){
 maxSame = maxSame || 2;
 let count = 0;
 for(const p of picked) if(p.market === candidate.market) count++;
 return count >= maxSame;
}

/* Helper: bonus diversità - schedine con piu' mercati diversi sono meglio */
function diversityBonus(legs){
 const markets = new Set();
 legs.forEach(l => markets.add(l.market));
 return markets.size; // 1=monoton, N=tutte diverse
}

/* Helper: penalita' per mercati supplementari (X=12, 1/2=10, MG 2-4=8 per ogni leg) */
function supplementaryPenalty(legs){
 let pen = 0;
 for(const l of legs) pen += supplementaryWeight(l.market);
 return pen;
}

function genTriplaRaddoppio(allMatches){
 const tries = [{confMin:60, qLegMin:1.20, qLegMax:1.70}, {confMin:50, qLegMin:1.15, qLegMax:1.85}, {confMin:40, qLegMin:1.12, qLegMax:2.00}];
 const labels = ['standard','tolerante','molto tolerante'];
 for(let ti=0;ti<tries.length;ti++){
  const cfg = tries[ti];
  const pool = [];
  for(const r of flatRecsForBetting(allMatches)){
   if(!r.odds || r.odds<cfg.qLegMin || r.odds>cfg.qLegMax) continue;
   if(r.confidence<cfg.confMin) continue;
   pool.push(r);
  }
  const cands = uniqueByMatch(pool).sort((a,b) => b.confidence-a.confidence).slice(0,20);
  const out = [];
  outer:
  for(let i=0; i<cands.length; i++){
   for(let j=i+1; j<cands.length; j++){
    for(let k=j+1; k<cands.length; k++){
     const a=cands[i], b=cands[j], c=cands[k];
     if(Math.max(correlationScore(a,b), correlationScore(a,c), correlationScore(b,c))>0.40) continue;
     const legs = [a,b,c];
     // Max 2 leg dello stesso mercato + max 1 MG 2-4
     const mktCount = {}; let suppCount = 0; let dup = false;
     for(const l of legs){
      mktCount[l.market]=(mktCount[l.market]||0)+1;
      if(mktCount[l.market]>2){ dup=true; break; }
      if(isSupplementaryMarket(l.market)){ suppCount++; if(suppCount>1){ dup=true; break; } }
     }
     if(dup) continue;
     const total = a.odds*b.odds*c.odds;
     if(total<1.65 || total>2.80) continue;
     const pJoint = a.pModel*b.pModel*c.pModel;
     const ev = pJoint*total-1;
     const div = diversityBonus(legs);
     const suppPen = supplementaryPenalty(legs);
     const score = (a.confidence+b.confidence+c.confidence)/3 + ev*15 + div*4 - suppPen;
     out.push({legs, totalOdds:total, pJoint, ev, ev_pct:ev*100, score, diversity:div});
     if(out.length>80) break outer;
    }
   }
  }
  if(out.length>0){ out.sort((x,y) => y.score-x.score); return {list: out.slice(0,3), mode: labels[ti]}; }
 }
 return {list:[], mode:'nessuna'};
}

function genCinquina(allMatches){
 const tries = [{confMin:55, qLegMin:1.18, qLegMax:1.55}, {confMin:48, qLegMin:1.15, qLegMax:1.65}, {confMin:40, qLegMin:1.12, qLegMax:1.80}];
 const labels = ['standard','tolerante','molto tolerante'];
 for(let ti=0;ti<tries.length;ti++){
  const cfg = tries[ti];
  const pool = [];
  for(const r of flatRecsForBetting(allMatches)){ if(!r.odds || r.odds<cfg.qLegMin || r.odds>cfg.qLegMax) continue; if(r.confidence<cfg.confMin) continue; pool.push(r); }
  // Ordino i candidati: prima i mercati primari, poi i supplementari (MG 2-4 in coda)
  const cands = uniqueByMatch(pool).sort((a,b) => {
   const aSupp = isSupplementaryMarket(a.market) ? 1 : 0;
   const bSupp = isSupplementaryMarket(b.market) ? 1 : 0;
   if(aSupp !== bSupp) return aSupp - bSupp; // primari prima
   return b.confidence - a.confidence;
  }).slice(0,25);
  if(cands.length<5) continue;
  const out = [];
  for(let attempt=0; attempt<10 && out.length<6; attempt++){
   const shuffled = cands.slice().sort(() => Math.random()-0.5+0.001*attempt);
   const picked = []; const usedLeagues = {}; const usedMarkets = {}; let suppCount = 0;
   for(const c of shuffled){
    if(picked.length>=5) break;
    let ok = true;
    for(const r of picked){ if(correlationScore(c, r)>0.40){ ok=false; break; } }
    if(ok && c.lega && (usedLeagues[c.lega]||0)>=2) ok=false;
    if(ok && (usedMarkets[c.market]||0)>=2) ok=false;
    if(ok && isSupplementaryMarket(c.market) && suppCount>=1) ok=false; // max 1 supplementare (1/X/2/MG 2-4)
    if(ok){ picked.push(c); if(c.lega) usedLeagues[c.lega]=(usedLeagues[c.lega]||0)+1; usedMarkets[c.market]=(usedMarkets[c.market]||0)+1; if(isSupplementaryMarket(c.market)) suppCount++; }
   }
   if(picked.length===5){
    const total = picked.reduce((s,r) => s*r.odds, 1);
    if(total>=2.00 && total<=5.50){
     const pJoint = picked.reduce((s,r) => s*r.pModel, 1);
     const ev = pJoint*total-1;
     const avgConf = picked.reduce((s,r) => s+r.confidence, 0)/5;
     const div = diversityBonus(picked);
     const suppPen = supplementaryPenalty(picked);
     const dup = out.find(o => o.legs.every((l,i) => l._key===picked[i]._key));
     if(!dup) out.push({legs:picked, totalOdds:total, pJoint, ev, ev_pct:ev*100, score:avgConf+ev*10+div*3-suppPen, diversity:div});
    }
   }
  }
  if(out.length>0){ out.sort((x,y) => y.score-x.score); return {list: out.slice(0,3), mode: labels[ti]}; }
 }
 return {list:[], mode:'nessuna'};
}

function genDecina(allMatches){
 const tries = [{confMin:50, qLegMin:1.18, qLegMax:1.55}, {confMin:42, qLegMin:1.15, qLegMax:1.70}, {confMin:35, qLegMin:1.12, qLegMax:1.85}];
 const labels = ['standard','tolerante','molto tolerante'];
 for(let ti=0;ti<tries.length;ti++){
  const cfg = tries[ti];
  const pool = [];
  for(const r of flatRecsForBetting(allMatches)){ if(!r.odds || r.odds<cfg.qLegMin || r.odds>cfg.qLegMax) continue; if(r.confidence<cfg.confMin) continue; pool.push(r); }
  const cands = uniqueByMatch(pool).sort((a,b) => {
   const aSupp = isSupplementaryMarket(a.market) ? 1 : 0;
   const bSupp = isSupplementaryMarket(b.market) ? 1 : 0;
   if(aSupp !== bSupp) return aSupp - bSupp;
   return b.confidence - a.confidence;
  }).slice(0,32);
  if(cands.length<10) continue;
  const out = [];
  for(let attempt=0; attempt<10 && out.length<4; attempt++){
   const shuffled = cands.slice().sort(() => Math.random()-0.5+0.001*attempt);
   const picked = []; const usedLeagues = {}; const usedMarkets = {}; let suppCount = 0;
   for(const c of shuffled){
    if(picked.length>=10) break;
    let ok = true;
    for(const r of picked){ if(correlationScore(c, r)>0.40){ ok=false; break; } }
    if(ok && c.lega && (usedLeagues[c.lega]||0)>=2) ok=false;
    if(ok && (usedMarkets[c.market]||0)>=3) ok=false;
    if(ok && isSupplementaryMarket(c.market) && suppCount>=2) ok=false; // max 2 supplementari (1/X/2/MG 2-4) su 10
    if(ok){ picked.push(c); if(c.lega) usedLeagues[c.lega]=(usedLeagues[c.lega]||0)+1; usedMarkets[c.market]=(usedMarkets[c.market]||0)+1; if(isSupplementaryMarket(c.market)) suppCount++; }
   }
   if(picked.length===10){
    const total = picked.reduce((s,r) => s*r.odds, 1);
    if(total>=4.00 && total<=40){
     const pJoint = picked.reduce((s,r) => s*r.pModel, 1);
     const ev = pJoint*total-1;
     const avgConf = picked.reduce((s,r) => s+r.confidence, 0)/10;
     const div = diversityBonus(picked);
     const suppPen = supplementaryPenalty(picked);
     const dup = out.find(o => o.legs.every((l,i) => l._key===picked[i]._key));
     if(!dup) out.push({legs:picked, totalOdds:total, pJoint, ev, ev_pct:ev*100, score:avgConf+ev*5+div*2-suppPen, diversity:div});
    }
   }
  }
  if(out.length>0){ out.sort((x,y) => y.score-x.score); return {list: out.slice(0,2), mode: labels[ti]}; }
 }
 return {list:[], mode:'nessuna'};
}

function genSingolaPotenziata(allMatches){
 const tries = [{confLeg1:65, confLeg2:60, q1Min:1.45, q1Max:1.80, q2Min:1.20, q2Max:1.50},
                {confLeg1:55, confLeg2:50, q1Min:1.40, q1Max:1.90, q2Min:1.18, q2Max:1.55},
                {confLeg1:48, confLeg2:45, q1Min:1.35, q1Max:2.00, q2Min:1.15, q2Max:1.60}];
 const labels = ['standard','tolerante','molto tolerante'];
 for(let ti=0;ti<tries.length;ti++){
  const cfg = tries[ti];
  const pool1Raw = [], pool2Raw = [];
  for(const r of flatRecsForBetting(allMatches)){
   // Leg1 (pick principale): NIENTE mercati supplementari (MG 2-4 escluso)
   if(r.odds && r.odds>=cfg.q1Min && r.odds<=cfg.q1Max && r.confidence>=cfg.confLeg1 && !isSupplementaryMarket(r.market)) pool1Raw.push(r);
   if(r.odds && r.odds>=cfg.q2Min && r.odds<=cfg.q2Max && r.confidence>=cfg.confLeg2) pool2Raw.push(r);
  }
  // Leg1: ordino per confidence (solo mercati primari)
  const pool1 = uniqueByMatch(pool1Raw).sort((a,b) => b.confidence-a.confidence);
  // Leg2: ordino con primari prima, supplementari (MG 2-4) in coda
  const pool2 = uniqueByMatch(pool2Raw).sort((a,b) => {
   const aSupp = isSupplementaryMarket(a.market) ? 1 : 0;
   const bSupp = isSupplementaryMarket(b.market) ? 1 : 0;
   if(aSupp !== bSupp) return aSupp - bSupp;
   return b.confidence - a.confidence;
  });
  if(pool1.length===0 || pool2.length===0) continue;
  const out = [];
  const usedLeg1 = new Set(), usedLeg2 = new Set();
  for(const a of pool1){
   if(usedLeg1.has(a._key)) continue;
   for(const b of pool2){
    if(usedLeg2.has(b._key)) continue;
    if(a._key === b._key) continue;
    const corr = correlationScore(a, b);
    if(corr > 0.35) continue;
    const totalOdds = a.odds * b.odds;
    if(totalOdds < 1.70 || totalOdds > 2.60) continue;
    const pJoint = a.pModel * b.pModel;
    const ev = pJoint * totalOdds - 1;
    const divBonus = a.market !== b.market ? 5 : 0;
    // Penalita' se Leg2 e' MG 2-4
    const suppPen = isSupplementaryMarket(b.market) ? 8 : 0;
    const score = (a.confidence + b.confidence) / 2 + ev * 20 + divBonus - suppPen;
    out.push({leg1: a, leg2: b, totalOdds, pJoint, ev, ev_pct: ev*100, corr, score});
    usedLeg1.add(a._key); usedLeg2.add(b._key);
    break;
   }
  }
  if(out.length>0){ out.sort((x,y) => y.score - x.score); return {list: out.slice(0,6), mode: labels[ti]}; }
 }
 return {list:[], mode:'nessuna'};
}

function genValueBets(allMatches){
 const tries = [{edgeMin:5, npMin:15}, {edgeMin:3, npMin:10}];
 const labels = ['standard','tolerante'];
 for(let ti=0;ti<tries.length;ti++){
  const cfg = tries[ti];
  const out = []; const seen = new Set();
  for(const r of flatRecsForBetting(allMatches)){
   if(r.confidence<55) continue;
   if(!r.odds || r.odds<1.40 || r.odds>10) continue;
   if(r.edge<cfg.edgeMin) continue;
   const np = r.sig && r.sig.s7 ? r.sig.s7.np : 0;
   if(np<cfg.npMin) continue;
   if(seen.has(r._key)) continue;
   seen.add(r._key); out.push(r);
  }
  if(out.length>0){ out.sort((a,b) => b.edge-a.edge); return {list: out.slice(0,10), mode: labels[ti]}; }
 }
 return {list:[], mode:'nessuna'};
}

function filterByMarketAll(allMatches, marketName){
 const out = [];
 for(const m of allMatches){
  for(const r of m.recs){
   if(r.fascia === 'empty') continue;
   if(marketName && r.market !== marketName) continue;
   out.push(r);
  }
 }
 return out;
}

/* Tutte le partite, anche monitor */
function getAllMatchesFlat(allMatches){
 const out = [];
 for(const m of allMatches){
  // Per ogni partita prendo la pick top (best)
  out.push(m.top);
 }
 return out;

function applySortAndFilter(recs){
 let out = recs.slice();
 if(S.ui.market) out = out.filter(r => r.market === S.ui.market);
 const sort = S.ui.sort || 'fascia';
 if(sort==='fascia'){
  const fOrd = {top:0, declassata:1, standard:2, monitor:3, empty:4};
  out.sort((a,b) => (fOrd[a.fascia]||9)-(fOrd[b.fascia]||9) || b.confidence-a.confidence);
 } else if(sort==='confidence') out.sort((a,b) => b.confidence-a.confidence);
 else if(sort==='ora') out.sort((a,b) => timeVal(a.ora)-timeVal(b.ora));
 else if(sort==='quotaAsc') out.sort((a,b) => (a.odds||999)-(b.odds||999));
 else if(sort==='quotaDesc') out.sort((a,b) => (b.odds||0)-(a.odds||0));
 else if(sort==='edge') out.sort((a,b) => (b.edge||0)-(a.edge||0));
 return out;
}

/* =================== GIOCATORI =================== */
function getPlayerMatches(){
 const map = new Map();
 (S.datasets.plCard||[]).forEach(p => {
  if(!map.has(p._key)) map.set(p._key, {key:p._key, partita:p.partita, lega:p.lega, ora:p.ora, cards:[], shots:[]});
  map.get(p._key).cards.push(p);
 });
 (S.datasets.plShot||[]).forEach(p => {
  if(!map.has(p._key)) map.set(p._key, {key:p._key, partita:p.partita, lega:p.lega, ora:p.ora, cards:[], shots:[]});
  const cur = map.get(p._key); if(!cur.lega) cur.lega = p.lega; if(!cur.ora) cur.ora = p.ora; cur.shots.push(p);
 });
 const arr = Array.from(map.values());
 arr.forEach(m => {
  m.cards.sort((a,b) => (b.rit||0)-(a.rit||0) || (b.amm||0)-(a.amm||0));
  m.shots.sort((a,b) => (b.rit||0)-(a.rit||0) || (b.gol||0)-(a.gol||0));
  m.hasRit = m.cards.some(c => c.rit>=RIT_THR) || m.shots.some(s => s.rit>=RIT_THR);
  m.maxRit = Math.max(0, ...m.cards.map(c => c.rit||0), ...m.shots.map(s => s.rit||0));
 });
 return arr.sort((a,b) => { if(a.hasRit && !b.hasRit) return -1; if(!a.hasRit && b.hasRit) return 1; return timeVal(a.ora)-timeVal(b.ora); });
}

 }).join('');

   txt += l.match + '\n';
   txt += l.market + ' @ *' + (l.odds||1).toFixed(2) + '*';

function copySlipToClipboard(format){
 const txt = buildSlipText(format);
 if(!txt){ showToast('Schedina vuota','err'); return; }
 const fallback = () => {
  try {
   const ta = document.createElement('textarea');
   ta.value = txt; ta.style.position='fixed'; ta.style.left='-9999px';
   document.body.appendChild(ta); ta.select();
   const ok = document.execCommand('copy');
   document.body.removeChild(ta);
   showToast(ok ? 'Copiato!' : 'Copia fallita','err');
  } catch(e){ showToast('Copia non supportata','err'); }
 };
 if(navigator.clipboard && navigator.clipboard.writeText){
  navigator.clipboard.writeText(txt).then(() => showToast('Copiato per ' + (format==='telegram'?'Telegram':format==='whatsapp'?'WhatsApp':'incolla ovunque'),'ok')).catch(fallback);
 } else fallback();
}

/* =================== PERFORMANCE TRACKING =================== */
/* Estrae tutte le legs chiuse (won/lost) da S.history con stake proporzionale */
function getAllClosedLegs(periodDays){
 const out = [];
 const cutoff = periodDays ? Date.now() - periodDays*86400000 : 0;
 (S.history||[]).forEach(h => {
  if(!h.legs || !h.legs.length) return;
  if(cutoff && new Date(h.savedAt).getTime() < cutoff) return;
  const stakePerLeg = h.stake / h.legs.length; // ripartizione proporzionale stake
  h.legs.forEach(l => {
   if(l.legStatus !== 'won' && l.legStatus !== 'lost') return;
   out.push({
    market: l.market || 'unknown',
    fascia: l.fascia || 'unknown',
    confidence: l.confidence || 0,
    odds: l.odds || 1,
    edge: l.edge || 0,
    status: l.legStatus,
    stakeShare: stakePerLeg,
    profitShare: l.legStatus==='won' ? stakePerLeg*((l.odds||1)-1) : -stakePerLeg,
    savedAt: h.savedAt,
    match: l.match,
    histId: h.id
   });
  });
 });
 return out;
}

/* Aggrega per chiave (mercato, fascia, range conf...) */
function aggregateBy(legs, keyFn){
 const groups = {};
 legs.forEach(l => {
  const k = keyFn(l);
  if(!groups[k]) groups[k] = {key:k, n:0, won:0, lost:0, totalStake:0, totalProfit:0, totalOdds:0, totalEdge:0};
  groups[k].n++;
  if(l.status==='won') groups[k].won++; else groups[k].lost++;
  groups[k].totalStake += l.stakeShare;
  groups[k].totalProfit += l.profitShare;
  groups[k].totalOdds += l.odds;
  groups[k].totalEdge += l.edge||0;
 });
 return Object.values(groups).map(g => ({
  ...g,
  hitRate: g.n ? (g.won/g.n)*100 : 0,
  roi: g.totalStake>0 ? (g.totalProfit/g.totalStake)*100 : 0,
  avgOdds: g.n ? g.totalOdds/g.n : 0,
  avgEdge: g.n ? g.totalEdge/g.n : 0
 })).sort((a,b) => b.n-a.n);
}

function confidenceRange(conf){
 if(conf>=90) return '90-99';
 if(conf>=80) return '80-89';
 if(conf>=70) return '70-79';
 if(conf>=60) return '60-69';
 if(conf>=50) return '50-59';
 return '<50';
}

function generateInsights(legs){
 if(legs.length < 5) return [{type:'info', txt:'Servono almeno 5 pick chiuse per generare insight affidabili. Attualmente: '+legs.length+'.'}];
 const insights = [];
 const byMkt = aggregateBy(legs, l => l.market);
 const byFascia = aggregateBy(legs, l => l.fascia);
 // 1. Mercato con miglior ROI (almeno 5 pick per significativita')
 const topMkt = byMkt.filter(g => g.n>=5).sort((a,b) => b.roi-a.roi)[0];
 if(topMkt && topMkt.roi > 10) insights.push({type:'good', txt:'Mercato top: <strong>'+topMkt.key+'</strong> con ROI '+topMkt.roi.toFixed(1)+'% su '+topMkt.n+' pick (hit '+topMkt.hitRate.toFixed(0)+'%).'});
 // 2. Mercato peggiore
 const badMkt = byMkt.filter(g => g.n>=5).sort((a,b) => a.roi-b.roi)[0];
 if(badMkt && badMkt.roi < -10) insights.push({type:'bad', txt:'Mercato in perdita: <strong>'+badMkt.key+'</strong> con ROI '+badMkt.roi.toFixed(1)+'% su '+badMkt.n+' pick (hit '+badMkt.hitRate.toFixed(0)+'%). Considera di evitarlo.'});
 // 3. Fascia Top vs Standard
 const topFascia = byFascia.find(g => g.key==='top');
 const stdFascia = byFascia.find(g => g.key==='standard');
 if(topFascia && stdFascia && topFascia.n>=5 && stdFascia.n>=5){
  if(topFascia.hitRate > stdFascia.hitRate + 10) insights.push({type:'good', txt:'Le Top Pick funzionano: hit '+topFascia.hitRate.toFixed(0)+'% vs Standard '+stdFascia.hitRate.toFixed(0)+'% (gap '+(topFascia.hitRate-stdFascia.hitRate).toFixed(0)+' punti).'});
  else if(topFascia.hitRate < stdFascia.hitRate) insights.push({type:'warn', txt:'Le Top Pick stanno deludendo: hit '+topFascia.hitRate.toFixed(0)+'% sotto le Standard '+stdFascia.hitRate.toFixed(0)+'%. Soglie da rivedere.'});
 }
 // 4. Confidence ranges
 const byConf = aggregateBy(legs, l => confidenceRange(l.confidence));
 const high = byConf.find(g => g.key==='90-99');
 const low = byConf.find(g => g.key==='50-59' || g.key==='60-69');
 if(high && high.n>=5 && high.hitRate < 65) insights.push({type:'warn', txt:'Anche con confidence 90+, hit-rate solo '+high.hitRate.toFixed(0)+'% ('+high.n+' pick). Le soglie potrebbero essere troppo ottimistiche.'});
 // 5. Hit rate generale
 const totalWon = legs.filter(l => l.status==='won').length;
 const overallHit = (totalWon/legs.length)*100;
 if(legs.length>=20){
  if(overallHit >= 60) insights.push({type:'good', txt:'Hit-rate generale solido: '+overallHit.toFixed(0)+'% su '+legs.length+' pick.'});
  else if(overallHit < 45) insights.push({type:'bad', txt:'Hit-rate generale basso: '+overallHit.toFixed(0)+'% su '+legs.length+' pick. Da rivedere i filtri.'});
 }
 if(insights.length===0) insights.push({type:'info', txt:'Nessun pattern significativo ancora. Continua ad accumulare dati.'});
 return insights;
}

function checkFreshnessAndShowBanner(){
 const meta = S.datasetMeta || {};
 const today = new Date(); today.setHours(0,0,0,0);
 const stale = [], fresh = [], missingCritical = [];
 DATASETS.forEach(d => {
  const n = (S.datasets[d.key]||[]).length;
  if(n===0){ if(d.critical) missingCritical.push(d.label); return; }
  const m = meta[d.key]; if(!m || !m.loadedAt){ stale.push(d.label); return; }
  const ts = new Date(m.loadedAt);
  const ageDay = Math.floor((today - new Date(ts.getFullYear(),ts.getMonth(),ts.getDate())) / (1000*60*60*24));
  if(ageDay >= 1) stale.push(d.label+' ('+ageDay+'gg)');
  else fresh.push(d.label);
 });

 div.innerHTML = body;

function findRecBy(key, market){
 if(!S.output) return null;
 for(const m of S.output.allMatches){
  if(m.match._key===key){ for(const r of m.recs) if(r.market===market) return r; }
 }
 return null;
}

/* =================== TICKET ACTIONS =================== */
function addToTicket(key, market){
 const rec = findRecBy(key, market);
 if(!rec){ showToast('Pick non trovata', 'err'); return; }
 if(rec.fascia==='monitor' || rec.fascia==='empty'){ showToast('Pick monitor: usa solo per info', 'err'); return; }
 if(S.ticket.legs.length>=10){ showToast('Max 10 leg', 'err'); return; }
 if(S.ticket.legs.find(l => l._key===key && l.market===market)){ showToast('Gia in schedina', 'err'); return; }
 for(const ex of S.ticket.legs){
  const corr = correlationScore(ex, rec);
  if(corr>0.40 && !confirm('Correlazione '+(corr*100).toFixed(0)+'% con "'+ex.match+'". Aggiungere?')) return;
 }
 S.ticket.legs.push({_key:rec._key, match:rec.match, market:rec.market, odds:rec.odds, ora:rec.ora, lega:rec.lega, dir:rec.dir, side:rec.side, pModel:rec.pModel, confidence:rec.confidence});
 if(S.ticket.legs.length===1) S.ticket.stake = Math.max(1, Math.round(rec.stake||10));
 schedulePersist(); showToast('Aggiunto', 'ok'); render();
}

function addComboToTicket(type, idx){
 const o = S.output; if(!o) return;
 let legs = null;
 if(type==='tripla'){ const c = genTriplaRaddoppio(o.allMatches).list[idx]; if(c) legs = c.legs; }
 else if(type==='cinquina'){ const c = genCinquina(o.allMatches).list[idx]; if(c) legs = c.legs; }
 else if(type==='decina'){ const c = genDecina(o.allMatches).list[idx]; if(c) legs = c.legs; }
 else if(type==='potenziata'){ const c = genSingolaPotenziata(o.allMatches).list[idx]; if(c) legs = [c.leg1, c.leg2]; }
 if(!legs) return;
 S.ticket.legs = legs.map(l => ({_key:l._key, match:l.match, market:l.market, odds:l.odds, ora:l.ora, lega:l.lega, dir:l.dir, side:l.side, pModel:l.pModel, confidence:l.confidence}));
 S.ticket.stake = Math.max(1, Math.round(S.bankroll.segregated*0.02));
 S.ui.tab = 'schedina'; schedulePersist(); render();
}

function removeLeg(idx){ S.ticket.legs.splice(idx,1); schedulePersist(); render(); }
function clearTicket(){ if(!S.ticket.legs.length) return; if(!confirm('Svuotare?')) return; S.ticket.legs=[]; S.ticket.stake=10; schedulePersist(); render(); }

function confirmTicket(){
 if(!S.ticket.legs.length) return;
 const totalOdds = S.ticket.legs.reduce((s,l) => s*(l.odds||1), 1);
 const tipo = S.ticket.legs.length===1?'Singola':S.ticket.legs.length===2?'Doppia':S.ticket.legs.length===3?'Tripla':S.ticket.legs.length===5?'Cinquina':S.ticket.legs.length===10?'Decina':'Multipla x'+S.ticket.legs.length;
 // Arricchisco ogni leg con i metadata della pick originaria per il tracking
 const enrichedLegs = S.ticket.legs.map(l => {
  const rec = findRecBy(l._key, l.market);
  return {
   _key: l._key, match: l.match, market: l.market, odds: l.odds, ora: l.ora, lega: l.lega, dir: l.dir, side: l.side, pModel: l.pModel,
   confidence: l.confidence,
   fascia: rec ? rec.fascia : 'unknown',
   edge: rec ? rec.edge : 0,
   topPick: rec ? rec.topPick : false,
   legStatus: 'open' // open / won / lost - tracciato per ogni leg
  };
 });
 S.history.unshift({id:'h_'+Date.now()+'_'+Math.random().toString(36).slice(2,7), savedAt: new Date().toISOString(), tipo, legs: enrichedLegs, totalOdds, stake: S.ticket.stake, status:'open', profit:0});
 S.ticket.legs=[]; S.ticket.stake=10;
 schedulePersist(); showToast('Pick salvata', 'ok'); S.ui.tab = 'storico'; render();
}

/* Aggiorna lo stato di una singola leg dentro una multipla.
   Quando tutte le leg sono chiuse, lo stato della multipla viene calcolato automaticamente. */
function setLegStatus(histId, legIdx, status){
 const item = S.history.find(x => x.id===histId); if(!item) return;
 if(!item.legs[legIdx]) return;
 item.legs[legIdx].legStatus = status;
 // Auto-calcolo stato multipla: vince solo se tutte vinte
 const allClosed = item.legs.every(l => l.legStatus==='won' || l.legStatus==='lost');
 if(allClosed){
  const allWon = item.legs.every(l => l.legStatus==='won');
  item.status = allWon ? 'won' : 'lost';
  item.profit = allWon ? (item.stake*item.totalOdds - item.stake) : -item.stake;
 } else {
  item.status = 'open'; item.profit = 0;
 }
 recomputeBankrollPL(); schedulePersist(); render();
}

function setHistStatus(id, status){
 const item = S.history.find(x => x.id===id); if(!item) return;
 item.status = status;
 if(status==='won') item.profit = item.stake*item.totalOdds-item.stake;
 else if(status==='lost') item.profit = -item.stake;
 else item.profit = 0;
 // Propago lo stato a tutte le leg: vinta -> tutte won, persa -> tutte lost (semplificazione)
 if(item.legs && item.legs.length){
  item.legs.forEach(l => { l.legStatus = status==='open' ? 'open' : status; });
 }
 recomputeBankrollPL(); schedulePersist(); render();
}

function removeHist(id){ if(!confirm('Eliminare?')) return; S.history = S.history.filter(x => x.id!==id); recomputeBankrollPL(); schedulePersist(); render(); }

function recomputeBankrollPL(){
 const today = new Date().toDateString();
 const startWeek = startOfWeekISO();
 let pld=0, plw=0, plTotal=0;
 S.history.forEach(h => {
  if(h.status==='open') return;
  const d = new Date(h.savedAt);
  if(d.toDateString()===today) pld += h.profit||0;
  if(d.toISOString()>=startWeek) plw += h.profit||0;
  plTotal += h.profit||0;
 });
 S.bankroll.pl_day = pld;
 S.bankroll.pl_week = plw;
 // Calcolo bankroll attuale = bankroll iniziale + somma profitti/perdite chiuse
 // S.bankroll.totalInit / segregatedInit memorizzano il valore "configurato" dall'utente
 if(S.bankroll.totalInit==null) S.bankroll.totalInit = S.bankroll.total;
 if(S.bankroll.segregatedInit==null) S.bankroll.segregatedInit = S.bankroll.segregated;
 S.bankroll.total = S.bankroll.totalInit + plTotal;
 S.bankroll.segregated = S.bankroll.segregatedInit + plTotal;
 // Anti-loss recovery: se bankroll segregato e' sceso sotto 90% dell'iniziale, attiva afterLossActive (riduce stake del 25%)
 S.bankroll.afterLossActive = S.bankroll.segregated < S.bankroll.segregatedInit * 0.90;
}

/* =================== PERSISTENZA =================== */
let saveTimer = null;
function schedulePersist(){ clearTimeout(saveTimer); saveTimer = setTimeout(persistState, 400); }
function persistState(){ try { localStorage.setItem(STORAGE_KEY, JSON.stringify({version: VERSION, savedAt: new Date().toISOString(), bankroll: S.bankroll, ticket: S.ticket, history: S.history, ui: S.ui, datasetMeta: S.datasetMeta||{}})); } catch(e){ console.warn('Persist failed', e); } }
function loadStateLocal(){
 try {
  const raw = localStorage.getItem(STORAGE_KEY); if(!raw) return;
  const obj = JSON.parse(raw); if(!obj || obj.version!==VERSION) return;
  if(obj.bankroll) Object.assign(S.bankroll, obj.bankroll);
  if(obj.ticket) Object.assign(S.ticket, obj.ticket);
  if(Array.isArray(obj.history)) S.history = obj.history;
  if(obj.ui) Object.assign(S.ui, obj.ui);
  if(obj.datasetMeta) S.datasetMeta = obj.datasetMeta;
  recomputeBankrollPL();
 } catch(e){ console.warn('Load failed', e); }
}

const DB_NAME = 'MAP_F5_DB', DB_VERSION = 1, DB_STORE = 'datasets';
function openDB(){ return new Promise((resolve, reject) => { if(!('indexedDB' in window)){ reject(new Error('IndexedDB non supp.')); return; } const req = indexedDB.open(DB_NAME, DB_VERSION); req.onerror = () => reject(req.error); req.onsuccess = () => resolve(req.result); req.onupgradeneeded = e => { const db = e.target.result; if(!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE, {keyPath:'key'}); }; }); }
function dbPutDataset(key, rows, savedAt, fileName){ return new Promise((resolve, reject) => { openDB().then(db => { const r = db.transaction(DB_STORE, 'readwrite').objectStore(DB_STORE).put({key, rows, savedAt: savedAt || new Date().toISOString(), fileName: fileName||''}); r.onsuccess = () => { db.close(); resolve(); }; r.onerror = () => { db.close(); reject(r.error); }; }).catch(reject); }); }
function dbDeleteDataset(key){ return new Promise((resolve, reject) => { openDB().then(db => { const r = db.transaction(DB_STORE, 'readwrite').objectStore(DB_STORE).delete(key); r.onsuccess = () => { db.close(); resolve(); }; r.onerror = () => { db.close(); reject(r.error); }; }).catch(reject); }); }
function dbGetAllDatasets(){ return new Promise((resolve, reject) => { openDB().then(db => { const r = db.transaction(DB_STORE, 'readonly').objectStore(DB_STORE).getAll(); r.onsuccess = () => { db.close(); resolve(r.result||[]); }; r.onerror = () => { db.close(); reject(r.error); }; }).catch(reject); }); }
function dbClearAll(){ return new Promise((resolve, reject) => { openDB().then(db => { const r = db.transaction(DB_STORE, 'readwrite').objectStore(DB_STORE).clear(); r.onsuccess = () => { db.close(); resolve(); }; r.onerror = () => { db.close(); reject(r.error); }; }).catch(reject); }); }

async function loadDatasetsFromDB(){
 try {
  const all = await dbGetAllDatasets();
  if(!all || !all.length) return {loaded:0};
  if(!S.datasetMeta) S.datasetMeta = {};
  all.forEach(item => { if(item && item.key && Array.isArray(item.rows)){ S.datasets[item.key] = item.rows; S.datasetMeta[item.key] = {fileName: item.fileName||'', loadedAt: item.savedAt||new Date().toISOString(), count: item.rows.length}; } });
  return {loaded: all.length};
 } catch(e){ console.warn('IDB load failed', e); return {loaded:0}; }
}

async function loadState(){ loadStateLocal(); return await loadDatasetsFromDB(); }

/* =================== UPLOAD =================== */
async function handleFileUpload(input){
 const key = input.dataset.target;
 const file = input.files && input.files[0];
 if(!key||!file){ setUploadStatus('File mancante', 'err'); return; }
 setUploadStatus('Lettura ' + file.name + '...');
 try {
  const text = await file.text();
  if(!text.trim()) throw new Error('File vuoto');
  parseAndStore(key, text, file.name);
  const n = (S.datasets[key]||[]).length;
  try { await dbPutDataset(key, S.datasets[key], new Date().toISOString(), file.name); setUploadStatus('OK '+escHtml(file.name)+' &middot; '+n+' righe salvate', 'ok'); }
  catch(eDb){ setUploadStatus('OK '+escHtml(file.name)+' &middot; '+n+' righe (NON salvato)', 'ok'); }
  const banner = document.getElementById('freshBanner'); if(banner) banner.remove();
  runDecisionEngine(); render();
 } catch(e){ setUploadStatus('Errore: '+e.message, 'err'); } finally { input.value = ''; }
}

async function clearDataset(key){
 const ds = DATASETS.find(d => d.key === key); const label = ds ? ds.label : key;
 if(!confirm('Eliminare "'+label+'"?')) return;
 S.datasets[key] = []; if(S.datasetMeta) delete S.datasetMeta[key];
 try { await dbDeleteDataset(key); } catch(e){}
 schedulePersist(); runDecisionEngine(); render();
 showToast('Eliminato', 'ok');
}

async function clearAllDatasets(){
 if(!confirm('Eliminare TUTTI i CSV?')) return;
 DATASETS.forEach(d => { S.datasets[d.key] = []; });
 S.datasetMeta = {};
 try { await dbClearAll(); } catch(e){}
 schedulePersist(); runDecisionEngine(); render();
 showToast('Tutti eliminati', 'ok');
}

function exportJSON(){
 try {
  const data = {version:VERSION, bankroll:S.bankroll, history:S.history, savedAt:new Date().toISOString()};
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'MAP_v7_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 300);
  showToast('Export OK', 'ok');
 } catch(e){ showToast('Export fallito', 'err'); }
}

function exportTicketPDF(){
 if(!window.jspdf||!window.jspdf.jsPDF){ showToast('PDF non pronta','err'); return; }
 if(!S.ticket.legs.length){ showToast('Vuota','err'); return; }
 const { jsPDF } = window.jspdf;
 const doc = new jsPDF({unit:'mm', format:'a5'});
 const t = S.ticket;
 const totalOdds = t.legs.reduce((s,l) => s*(l.odds||1), 1);
 doc.setFillColor(76,224,135); doc.rect(0,0,148,16,'F');
 doc.setTextColor(29,36,56); doc.setFont('helvetica','bold'); doc.setFontSize(13);
 doc.text('SCHEDINA - MAP v7', 10, 10);
 doc.setTextColor(30,30,30); doc.setFontSize(9);
 doc.autoTable({startY:22, head:[['#','Match','Mercato','Quota']], body: t.legs.map((l,i) => [i+1, l.match, l.market, l.odds?l.odds.toFixed(2):'-']), theme:'grid', styles:{fontSize:8,cellPadding:3}, margin:{left:10,right:10}});
 let y = doc.lastAutoTable.finalY+6;
 doc.setFontSize(10); doc.setFont('helvetica','bold');
 doc.text('Quota: '+totalOdds.toFixed(2), 10, y); y+=5;
 doc.text('Stake: '+fmtEur(t.stake), 10, y); y+=5;
 doc.text('Vincita: '+fmtEur(t.stake*totalOdds), 10, y);
 doc.save('ticket_'+Date.now()+'.pdf'); showToast('PDF OK', 'ok');
}

/* =================== EVENTI =================== */
function bindEvents(){
 document.getElementById('navTabs').addEventListener('click', e => {
  const btn = e.target.closest('.nav-btn'); if(!btn) return;
  S.ui.tab = btn.dataset.tab; schedulePersist(); render();
 });
 document.getElementById('uploadTg').addEventListener('click', () => {
  S.ui.uploadOpen = !S.ui.uploadOpen;
  const body = document.getElementById('uploadBody'); const tg = document.getElementById('uploadTg');
  if(S.ui.uploadOpen){ body.classList.add('open'); tg.classList.add('open'); } else { body.classList.remove('open'); tg.classList.remove('open'); }
  schedulePersist();
 });
 document.body.addEventListener('change', e => {
  const t = e.target;
  if(t.tagName==='INPUT' && t.type==='file' && t.dataset.target) handleFileUpload(t);
  if(t.id==='histStat'){ S.ui.histFilter = t.value; schedulePersist(); render(); }
  if(t.id==='sortSel'){ S.ui.sort = t.value; schedulePersist(); render(); }
  if(t.id==='perfPeriod'){ S.ui.perfPeriod = t.value; schedulePersist(); render(); }
 });
 document.body.addEventListener('click', e => {
  const tgt = e.target;
  const badge = tgt.closest('[data-badge]');
  if(badge){
   const recAttr = badge.getAttribute('data-rec'); let recData = null;
   if(recAttr){ const [k, m] = recAttr.split('|'); recData = findRecBy(k, m); }
   showBadgeInfo(badge.dataset.badge, recData); return;
  }
  const gv = tgt.closest('[data-view]');
  if(gv){ S.ui.view = gv.dataset.view; schedulePersist(); render(); return; }
  const vc = tgt.closest('[data-view-click]');
  if(vc){ S.ui.view = vc.dataset.viewClick; schedulePersist(); render(); return; }
  const mkt = tgt.closest('[data-market-filter]');
  if(mkt){ const v = mkt.getAttribute('data-market-filter'); S.ui.market = (v==='__CLEAR__'?null:v); schedulePersist(); render(); return; }
  const iaT = tgt.closest('[data-ia-toggle]');
  if(iaT){ S.ui.iaOnlyHigh = !S.ui.iaOnlyHigh; schedulePersist(); render(); return; }
  const plT = tgt.closest('[data-pl-toggle]');
  if(plT){ S.ui.plOnlyRit = !S.ui.plOnlyRit; schedulePersist(); render(); return; }
  const pick = tgt.closest('[data-pick]');
  if(pick){ const inp = document.querySelector('input[type=file][data-target="'+pick.dataset.pick+'"]'); if(inp) inp.click(); return; }
  const clr = tgt.closest('[data-clear]');
  if(clr){ clearDataset(clr.dataset.clear); return; }
  const add = tgt.closest('[data-add]');
  if(add){ const [k,m] = add.dataset.add.split('|'); addToTicket(k, m); return; }
  const addCombo = tgt.closest('[data-add-combo]');
  if(addCombo){ const [type,idx] = addCombo.dataset.addCombo.split('|'); addComboToTicket(type, parseInt(idx)); return; }
  const rml = tgt.closest('[data-rm-leg]');
  if(rml){ removeLeg(parseInt(rml.dataset.rmLeg)); return; }
  const hs = tgt.closest('[data-set-status]');
  if(hs){ const [id,st] = hs.dataset.setStatus.split('|'); setHistStatus(id, st); return; }
  const hls = tgt.closest('[data-leg-status]');
  if(hls){ const [id,idx,st] = hls.dataset.legStatus.split('|'); setLegStatus(id, parseInt(idx), st); return; }
  const hd = tgt.closest('[data-rm-hist]');
  if(hd){ removeHist(hd.dataset.rmHist); return; }
  if(tgt.id==='confirmTicket'){ confirmTicket(); return; }
  if(tgt.id==='copyTG'){ copySlipToClipboard('telegram'); return; }
  if(tgt.id==='copyWA'){ copySlipToClipboard('whatsapp'); return; }
  if(tgt.id==='copyPlain'){ copySlipToClipboard('plain'); return; }
  if(tgt.id==='clearTicket'){ clearTicket(); return; }
  if(tgt.id==='exportTicketPDF'){ exportTicketPDF(); return; }
  if(tgt.id==='exportJSON'){ exportJSON(); return; }
  if(tgt.id==='recomputeBtn'){ runDecisionEngine(); render(); showToast('Ricalcolato', 'ok'); return; }
  if(tgt.id==='upClearAllBtn'){ clearAllDatasets(); return; }
  if(tgt.id==='bkSave'){
   const tot = parseFloat(document.getElementById('bkTotal').value)||1000;
   const seg = parseFloat(document.getElementById('bkSeg').value)||tot;
   // Salvo come valori "iniziali" di riferimento. Il bankroll attuale viene poi ricalcolato sommando i P/L chiusi.
   S.bankroll.totalInit = tot;
   S.bankroll.segregatedInit = seg;
   S.bankroll.total = tot;
   S.bankroll.segregated = seg;
   recomputeBankrollPL();
   schedulePersist(); runDecisionEngine(); render(); showToast('Salvato', 'ok'); return;
  }
  if(tgt.id==='bkResetWeek'){ if(!confirm('Reset?')) return; S.bankroll.startWeek = startOfWeekISO(); S.bankroll.pl_week = 0; schedulePersist(); render(); return; }
 });
 document.body.addEventListener('input', e => {
  if(e.target.id==='kellyFrac'){ const v = parseFloat(e.target.value); document.getElementById('kellyFracOut').textContent = v.toFixed(2); S.bankroll.kellyFraction = v; schedulePersist(); runDecisionEngine(); }
  if(e.target.id==='capPct'){ const v = parseFloat(e.target.value); document.getElementById('capPctOut').textContent = (v*100).toFixed(1)+'%'; S.bankroll.capPct = v; schedulePersist(); runDecisionEngine(); }
  if(e.target.id==='stakeInp'){ S.ticket.stake = parseFloat(e.target.value)||0; schedulePersist(); const tot = S.ticket.legs.reduce((s,l) => s*(l.odds||1), 1); const win = S.ticket.stake*tot; const wEls = document.querySelectorAll('.ticket-total .v'); if(wEls[0]) wEls[0].textContent = fmtEur(win); if(wEls[1]) wEls[1].textContent = fmtEur(win-S.ticket.stake); }
  if(e.target.id==='allSearch'){ S.ui.q = e.target.value; render(); }
 });
 bus.on('csv:loaded', () => render());
 bus.on('data:recomputed', () => { if(S.ui.tab==='oggi') renderOggi(); });
}

async function init(){
 bindEvents(); render();
 const result = await loadState();
 if(result && result.loaded > 0){
  runDecisionEngine(); render();
  showToast(result.loaded+' CSV caricati', 'ok');
  setTimeout(() => checkFreshnessAndShowBanner(), 600);
 } else {
  render();
  if(!S.ui.uploadOpen){ setTimeout(() => { document.getElementById('uploadTg').click(); }, 200); }
 }
 console.log('MAP v7 pronto');
}

global.MAP = {init, S, bus, runDecisionEngine, render};

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init);
else init();

})(window);
